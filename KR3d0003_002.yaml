body:
  text: 農桑輯要卷二元司農司撰播種收九榖種黍稷稗稻麻大麥小麥大豆小豆齊民要術凡五榖種子浥鬱則不生生者亦尋死種雜者禾則早晚不均舂復減而難熟糶賣以雜糅見訾炊㸑失生熟之節所以特宜存意不可徒然粟黍穄梁秫常嵗别收選好穗純色者劁才雕反刈高懸之以擬明年種子將種前二十許日開出水淘浮秕去則無莠即曬令燥種之汜勝之書曰牽馬令就榖堆食數口以馬踐過為種無虸蚄等蟲也又種傷濕鬱熱則生蟲也又薄田不能糞者以原蠶矢雜禾種種之則禾不蟲又取馬骨銼一石以水三石煮之三沸漉去滓以汁漬附子五枚三四日去附子以汁和蠶矢羊矢各等分撓呼老反攪也令洞洞如稠粥先種二十日時以溲疏有反種如麥飯狀當天旱燥時溲之立乾薄布數撓令乾明日復溲天隂雨則勿溲六七溲而止輒曝謹藏勿令復濕至可種時以餘汁溲而種之則禾稼不蝗蟲無馬骨亦可用雪汁雪汁者五榖之精也使稼耐旱常以冬藏雪汁器盛埋於地中治種如此則收常倍取麥種候熟可穫擇穗大强者斬束立場中之高燥處曝使極燥無令有白魚有輒揚治之取乾艾雜藏之麥一石艾一把藏以瓦器竹器順時種之則收常倍取禾種擇高大者斬一節下把懸高燥處苗則不敗欲知嵗所宜以布囊盛粟等諸物種平量之埋隂地冬至日窖埋冬至後五十日發取量之息最多者嵗所宜也崔實曰平量五榖各一升小罌盛埋牆隂下餘法同上師曠占術曰五木者五榖之先欲知五榖但視五木擇其木盛者來年多種之萬不一失也雜隂陽書曰禾生於棗或楊大麥生於杏小麥生於桃稻生於栁或楊黍生於榆大豆生於槐小豆生於李麻生於楊或荆又凡種禾宜寅午申忌乙丑壬癸秫忌寅晚禾忌丙大麥宜亥卯辰忌子丑戊己小麥忌與大麥同稻宜戊己四季日忌寅卯辰甲乙黍宜已酉戌忌寅卯丙午穄忌未寅大豆宜申子壬忌卯午丙子甲乙小豆忌與大豆同麻忌四季日戊己凡五榖大判宜上旬次中旬史記曰隂陽之家拘而多忌止可知其梗概不可委曲從之諺曰以時其澤為上䇿也種榖齊民要術凡榖成熟有早晚苗稈有高下收實有多少質性有强弱米味有美惡粒實有息耗早熟者苗短而收多晚熟者苗長而收少强苗者短黃榖之屬是也弱苗者長青白黑者是也收少者美而耗收多者惡而息也地勢有良薄良田宜種晚薄田宜種早良田非獨宜晚早亦無害薄地宜早晚必不成實也崔實曰美田欲稠薄田欲稀山澤有異宜山田種强苗以避風霜澤田種弱苗以求華實也順天時量地利則用力少而成功多任情返道勞而無獲凡榖田菉豆小豆底為上麻黍胡麻次之蕪菁大豆為下常見瓜底不減菉豆本既不論聊復記之凡春種欲深夏種欲淺凡種榖雨後為佳遇小雨宜接濕種遇大雨待薉音穢生小雨不接濕無以生禾苗大雨不待白背濕轆則令苗瘦薉若盛者先鋤一遍然後納種乃佳也春若遇早秋耕之地得仰壟待雨春耕者不中也夏若仰壟匪直蕩汰不生兼與草薉俱出凡田欲早晚相雜嵗道有所宜有閏之嵗節氣近後宜晚田然大率欲早早田倍多於晚早田淨而易治晚者蕪穢難治其收之多少從嵗所宜非關早晚然早榖皮薄米實而多晚榖皮厚米少而虛也苗生如馬耳則鏃初角反鋤諺曰欲得榖馬耳鏃稀豁之處鋤而補之凡五榖唯小鋤之為良小鋤者非直省功榖亦倍勝大鋤者草根繁茂用功多而收益少苗出壟則深鋤鋤不厭數周而復始勿以無草而暫停鋤者非止除草乃熟地而實多糠薄米息鋤得十遍便得八米也春鋤起地夏為除草故春鋤不用觸濕六月已後雖濕亦無嫌春苗既淺隂未覆地濕鋤則地堅夏苗隂厚地不見日故雖濕亦無害矣管子曰為國者使農寒耕而熱藝藝除草也吕氏春秋曰苗其弱也欲孤弱小也苗始生小時欲得孤特疏數則茂好也其長也欲相與俱言相依植不偃仆其熟也欲相扶相扶持不傷折是故三以為族乃多粟族聚也吾苗有行故速長弱不相害故速大橫行必得從行必術正其行通其風行行列也凡種欲牛遲緩行種人令促步以足躡壟底牛遲即子勻足躡則苗茂足跡相接者亦不煩撻也熟速刈乾速積刈早則鎌傷刈晚則穗折遇風則收減濕積則藳爛積晚則損耗連雨則生耳孝經援神契曰黃白土宜禾汜勝之書曰種無期因地為時三月榆莢時雨膏地强可種禾植禾夏至後八九十日常夜半候之天有霜若白露下以平明時令兩人持長索相對各持一端以概禾中去霜露日出乃止如此禾稼五榖不傷矣漢食貨志曰種榖必雜五種以備災害田中不得有樹用妨五榖力耕數耘收穫如盜寇之至董仲舒曰春秋他榖不書至於麥禾不成則書之以此見聖人於五榖最重麥禾也種蒔直說藝苗之法其凡有四第一次曰撮苗第二次曰布第三次曰擁第四次曰復俗曰添米一功不至則稂莠之害秕糠之雜入之矣今之器以鋤營州之東以鏟爰有一器出自海壖號曰耬鋤耬樣一如下種耬但獨腳無耬斗耳於獨腳下端從後向上斜鑿一竅兩轅中央近後舊安耬斗處橫桄中亦鑿一竅鋤制柄項彎曲一如藝苗鋤但其柄純以鐵為之粗細上下若一鋤刃尖圓如杏葉樣用時將鋤柄於耬腳下端斜竅中穿過其柄末上出橫桄竅中其鋤刃橫冒於耬腳下端撮苗後用一驢帶籠觜挽之初用一人撁慣熟不用人止一人輕扶入土二三寸其深痛過鋤力三倍所辦之田日不啻二十畝今燕趙多用之名曰劐子劐子之制又少異於此劐子第一遍即成溝子榖根未成不耐旱耬鋤刃在土中故不成溝子第二遍加劈土木鴈翅方成溝子其土分壅榖根劈土用木厚三寸濶三寸長七寸取成三角樣前為尖中鑿一竅長一寸濶半寸穿於鐵鋤柄上壓鋤刃上韓氏直說如耬鋤過苗間有小豁不到處用鋤理撥一遍如種黍粟大小等田當用一尺三寸寬腳種蒔下種易使鋤耬故也如種麻麥用狹腳種蒔則可大小麥青稞附齊民要術大小麥皆須五月六月暵地不暵地而種者其收倍薄崔實曰五月六月菑麥田也孝經援神契云黑墳宜麥汜勝之書曰種麥得時無不善早種則蟲而有節晚則穗小而少實當種麥若天旱無雨澤則薄漬麥種以酢醋同漿并蠶矢夜半漬向晨速投之令與白露俱下酢漿令麥耐旱蠶矢令麥忍寒麥生黃色傷於太稠稠者鋤而稀之崔實曰凡種大小麥得白露節可種薄田秋分種中田後十日種美田惟􅜿古猛反大麥類麥早晚無常正月可種春麥案齊民要術春麥下有豍豆二字盡二月止青稞苦禾反麥石麥治打時稍難惟映日用碌碡碾與大麥同時熟麵堪作麨及餺飥甚美磨盡無麩鋤一遍佳不鋤亦得四時類要曬大小麥今年收者于六月掃庭除候地毒熱衆手出麥薄攤取蒼耳碎銼拌曬之至未時及熱收可以二年不蛀若有陳麥亦須依此法更曬須在立秋前秋後則蟲生恐無益矣士農必用古農語云彭祖壽年八百不可忘了稙蠶稙麥又云社後種麥爭回耬又云社後種麥爭回牛言奪時甚急也韓氏直說五六月麥熟帶青收一半合熟收一半若過熟則拋費每日至晚即便載麥上場堆積用苫繳覆以防雨作如搬載不及即于地內苫積天晴乘夜載上場即攤一二車薄則易乾碾過一遍翻過又碾一遍起秸下場揚子收起雖未淨直待所收麥都碾盡然後將未淨秸稈再碾如此可一日一場比至麥收盡已碾訖三之二農家忙併無似蠶麥古語云收麥如救火若少遲慢一值隂雨即為災傷遷延過時秋苗亦誤鋤治水稻齊民要術稻無所緣唯嵗易為良選地欲近上流地無良薄水清則稻美也三月種者為上時四月上旬為中時中旬為下時先放水十日後曳轆軸十遍遍數唯多為良地既熟淨淘種子浮者不去秋則生稗漬經三宿漉出內草篅市專反判竹圜以盛榖裛之復經三宿芽長二分一畝三升擲三日之中令人驅鳥稻苗長七八寸陳草復起以鎌侵水芟之草悉膿死稻苗漸長復須薅拔草曰薅虎高反薅訖決去水曝根令堅量時水旱而溉之將熟又去水霜降穫之早刈米青而不堅晚刈零落而損收北土高原本無陂澤隨逐隈曲而田者二月冰解地乾燒而耕之仍即下水十日塊既散液持木斫平之納種如前法既生七八寸拔而栽之既非嵗易草稗俱生芟亦不死故須栽而薅之溉灌收刈一如前法畦㽟音劣堤崖也大小無定須量地宜取水均而已藏稻必須用簞此既水榖窖埋得地氣則爛敗也春稻必須冬時積日燥曝一夜置霜露中即舂苦冬舂不乾即米青赤脈起不經霜不燥曝則米碎矣秫稻法一切同周官曰稻人掌稼下地鄭注以水澤之地種榖也謂之稼者有似嫁女相生以瀦畜水以防止水以溝蕩水以遂均水以列舍水以澮寫水以涉揚其芟作田鄭注鄭司農說瀦防以春秋傳曰町原防規偃豬以列舍水列者非一道以去水也以涉揚其芟以其水寫故得行其田中舉其芟鈎也杜子春讀蕩為和蕩謂以溝行水也𤣥謂偃瀦者畜流水之陂也防瀦旁堤也遂田首受水小溝也列田之畦㽟也澮田尾去水大溝作猶治也開遂舍水于列中因涉之揚去前年所芟之草而治田種稻凡稼澤夏以水殄草而芟夷之鄭注殄病也絶也鄭司農說芟夷以春秋傳曰芟夷藴崇之今時謂禾下麥為夷下麥言芟刈其禾于下種麥也𤣥謂將以澤地為稼者必於夏六月之時大雨時行以水病絶草之後生者至秋水涸芟之明年乃稼澤草所生種之芒種鄭注鄭司農云澤草之所生其地可種芒種芒種稻麥也汜勝之書曰種稻春凍解耕反其土種稻區不欲大大則水深淺不適冬至後一百一十日可種稻始種稻欲濕濕者缺其塍食陵反畦畔也令水道相直夏至後大熱令水道錯崔實曰三月可種粳稻稻美田欲稀薄田欲稠旱稻齊民要術旱稻用下田白土勝黑土非言下田勝高原但下停水者不得禾豆麥稻四種雖潦亦收所謂彼此俱穫不失地利故也下田種者用功多高原種者與禾同等也凡下田停水處燥則堅垎胡格反土乾也濕則汙泥難治而易荒墝口交反埆音殼而殺種其春耕者殺種尤甚故宜五六月暵之以擬大麥麥時水潦不得納種者九月中復一轉至春種稻萬不失一春耕者十不收五蓋誤人耳凡種下田不問秋夏候水盡地白背時速耕杷勞杷白駕反頻翻令熟過燥則堅遇雨則泥所以宜速耕也二月半種稻為上時三月為中時四月初及半為下時漬種如法裛令開口耬耩䅖種之耩故項反䅖烏感反䄋種者省種而生科又勝擲者即再遍勞若嵗寒早種慮時晚即不漬種恐芽焦也其土黑堅彊之地種未生前遇旱者欲得令牛羊及人踐履之濕則不用一迹入也稻既生猶欲令人踐壟背踐者茂而多實也苗長三寸杷勞而鋤之鋤唯欲速稻苗性弱不能扇草宜數鋤之每經一雨輒欲杷勞苗高尺許則鋒古農器天雨無所作宜冒雨薅之科大如穊者五六月中霖雨時拔而栽之栽法欲淺令其根鬚四散則滋茂深而直下者聚而不科其苗長者亦可拔去葉端數寸勿傷其心也入七月不復任栽七月百草成時晚故也其高田種者不求極良唯須廢地過良則苗折廢地則無草亦秋耕杷勞令熟至春黃場始章反納種不宜濕下餘法悉與下田同黍穄稗附齊民要術凡黍穄田新開荒為上大豆底為次榖底為下地必欲熟再轉乃佳若春夏耕者下種後再勞為良一畝用子四升三月上旬種者為上時四月上旬為中時五月上旬為下時夏種黍穄與植榖同時非夏者大率以椹赤為候諺曰椹釐釐種黍時燥濕候黃場種訖不曳撻今時屯子也常記十月十一月十二月凍樹日種之萬不失一凍樹者凝霜封著木條也假令月三日涷樹還以月三日種黍他皆倣此十月凍樹宜早黍十一月凍樹宜中黍十二月凍樹宜晚黍若從十月至正月皆凍樹者早晚黍悉宜也刈穄欲早黍欲晚穄晚多零落黍早米不成諺曰穄青喉黍折頭皆即濕踐久漬則浥鬱燥踐多兜牟穄踐訖即蒸而裛之不蒸者難舂米碎至春又土臭蒸則易舂米堅香氣經久不歇也黍宜曬之令燥濕聚則鬱凡黍黏者收薄穄味美者亦收薄難舂孝經援神契云黑墳宜黍汜勝之書曰黍者暑也種者必待暑黍心未生雨灌其心心傷無實黍心初生畏天露令兩人對持長索概去其露日出乃止凡種黍覆土鋤治皆如禾法稗既堪水旱種無不熟之時又特滋茂宜種之備凶年稗中有米熟時搗取米炊食之不減粱米又可釀作酒酒甚美釅尤踰黍秫魏武使典農種之頃收二千斛斛得米三四斗大儉可磨食之若值豐年可以飯牛馬豬羊務本新書種糯不換糯米價值比黃米價高今有與糯米相類者白黃米是也舊呼糯不換宜多種之造酒為佳粱秫齊民要術粱秫並欲薄地而稀種與植榖同時晚者全不收也燥濕之宜杷勞之法一同榖苗收刈欲晚性不零落早刈損實大豆豍豆附齊民要術春大豆次植榖之後二月中旬為上時三月上旬為中時四月上旬為下時嵗宜晚者五六月亦得然稍晚稍加種子地不求熟地過熟者苗茂而實少收刈欲晚此不零落刈早損實鋤不過再葉落盡然後刈葉不盡則難治刈訖則速耕大豆性溫秋不耕則無澤也孝經援神契曰赤土宜菽也泛勝之書曰大豆保嵗易為宜古之所以備凶年也謹計家口數種大豆率人五畝此田之本也三月榆莢時有雨高田可種大豆土和無塊畝五升土不和則益之種大豆夏至後二十日尚可種戴甲而生不用深耕大豆須均而稀豆花憎見日見日則黃爛而根焦也穫豆之法莢黑而莖蒼輒收無疑其實將落反失之故曰豆熟于場青莢在上黑莢在下崔實曰正月可種豍豆二月可種大豆又曰三月昏參夕杏花盛桑椹赤可種大豆四月時雨降可種大小豆美田欲稀薄田欲稠小豆菉豆白豆附齊民要術小豆大率用麥底然恐小晚有地者常須兼留去嵗榖下以擬之泛勝之書曰小豆不保嵗難得椹黑時注雨種豆生布葉鋤之生五六葉又鋤之大豆小豆不可盡治也古所以不盡治者豆生布葉豆有膏盡治之則傷膏傷則不成而民盡治故其收耗折也菉豆白豆種法與小豆同豌豆務本新書豌豆二三月種諸豆之中豌豆最為耐陳又收多熟早如近城郭摘豆角賣先可變物舊時莊農往往獻此豆以為嘗新蓋一嵗之中貴其先也又熟時少有人馬傷踐以此校之甚宜多種薥黍務本新書薥黍宜下地春月早種省工收多耐用人食之餘擸碎多拌麩糠以飼五㹀外秸稈織箔夾籬寨作燒柴城郭貨賣亦可變物蕎麥齊民要術凡蕎麥五月耕經二十五日草爛得轉并種耕三遍立秋前後皆十日內種之假如地耕三遍即三重著子下兩重子黑上一重子白皆有白汁滿如濃即須收刈之但對梢相搭鋪之其白者日漸盡變為黑如此乃為得所若待上頭總黑半已下黑子盡落矣胡麻本草衍義曰止是脂麻也齊民要術胡麻漢張騫從外國得麻種曰胡麻俗呼為烏麻非也今世有白胡麻八稜胡麻白者油多而又可以為飯宜白地種二三月為上時四月上旬為中時五月上旬為下時月半前種者實多而成月半後種者少子而多秕也種欲截雨腳若不緣濕融而不生一畝用子二升漫種者先以耬耩然後散子空曳勞勞上加人則土厚不生耬耩者炒沙令燥中半和之不和沙下不均壟種若荒得用鋒耬鋤不過三遍刈束欲小束大則難燥打手復不勝以五六束為一藂斜倚之不爾則風吹倒損收也候口開乘車詣田抖擻倒豎以小杖微打之還藂之三日一打四五遍乃盡耳若乘濕橫積蒸熱速乾雖鬱裛無風吹虧損又慮裛者不中為種子然油無損也四時類要每科相去一尺為法麻子蘇子附齊民要術止取實者種斑黑麻子斑黑者實饒崔實曰苴麻子黑又實而重搗治作燭不作麻耕須再遍一畝用子二升三月種者為上時四月為中時五月初為下時大率二尺留一根穊則不成鋤常令淨荒則少實既放勃拔去雄若未放勃去雄者則不成子實凡五榖地畔近道者多為六畜所犯宜種胡麻麻子以遮之胡麻六畜不食麻子齧頭則科大收此二實足供美燭之費也慎勿于大豆地中雜種麻子扇地兩損而收並薄六月中可于麻子地間散蕪菁子而鋤之擬收其根泛勝之書曰樹高一尺以蠶矢糞之無蠶矢以溷中熟糞亦善樹一升天旱以流水澆之無流水曝井水殺其寒氣以澆之雨澤時適勿澆澆不欲數霜下實成速斫之其樹大者以鋸鋸之務本新書凡種五榖如地畔近道者亦可另種蘇子以遮六畜傷踐收子打油燃燈甚明或熬油以油諸物麻齊民要術凡種麻用白麻子白麻子為雄麻顔色雖白齧破枯燥無膏潤者秕子也亦不中種市糴者口含少時顔色如舊者佳如變黑者衰麻欲得良田不用故墟故墟有夥葉夭折之患不任作布也夥丁破反草葉壞也地薄者糞之糞宜熟無熟者用小豆底亦得崔實曰正月糞疇疇麻田也耕不厭熟縱橫七遍已上則麻無葉也田欲嵗易拋子種則節高良田一畝用子三升薄田二升穊則細而不長稀則粗而皮惡夏至前十日為上時至日為中時至後十日為下時麥黃種麻麻黃種麥亦良候也諺曰夏至後不沒狗或答曰但雨多沒橐駝又諺曰五月及澤父子不相借言及澤急也夏至後者匪唯淺短皮亦輕薄此亦趨時不可失也父子之間尚不相假借而况他人者也澤多者先漬麻子令芽生取雨水浸之生芽疾用井水則生遲浸法著水中如炊雨石米頃漉出著席上布令厚三四寸數攪之令均得地氣一宿即芽出水若滂沛十日亦不生待地白背耬耩漫擲子空曳勞截雨腳即種者地濕麻生瘦待白背者麻生肥澤少者暫浸即出不得待生芽耬頭中下之不勞曳撻麻生數日中常驅雀葉青乃止布葉而鋤頻翻再遍止高而鋤者便傷麻稠弱不堪者拔去勃如灰便刈刈拔各隨鄉法未勃者收皮不成放勃不收即曬刊古典反小束也欲小􅀈普胡反欲薄為其易乾一宿輒翻之得霜露則皮黃也穫欲淨有葉者易爛漚欲清水生熟合宜濁水則麻黑水少則麻脆生則難剝太爛則不任挽暖泉不冰凍冬日漚者最為柔韌也泛勝之書曰種枲太早則剛堅厚皮多節晚則皮不堅寧失于早不失于晚夏至後二十日漚枲枲和如絲苧麻圖經苧根舊不載所出州土今閩蜀江浙有之其皮可以績布苗高七八尺葉如楮葉面青背白有短毛夏秋間著細穗青花其根黃白而輕虛二月八月採又有一種山苧亦相似謹按陸機草木疏云苧一科數十莖宿根在地中至春自生不須栽種荆揚間嵗三刈官令諸園種之剝取其皮以竹刮其表厚處自脫得裏如筋者煮之用緝今江浙閩中尚復如此孕婦胎損方所須又主白丹濃煮水浴之日三四差韋宙療癰疽發背初覺未成膿者以苧根葉熟搗傅上日夜數易之腫消則差矣陶隱居云苧即今績麻也新添栽種苧麻法三四月種子者初用沙薄地為上兩和地為次園圃內種之如無園者瀕河近井處亦得先倒劚土一二遍然後作畦濶半步長四步再劚一遍用腳浮躡或杴背浮按稍實不然著水虛懸再杷蒲巴反平隔宿用水飲畦明旦細齒杷浮耬起土再杷平隨時用濕潤畦土半升子粒一合相和勻撒子一合可種六七畦撒畢不用覆土覆土則不出于畦內用極細梢杖三四根撥刺令平可畦搭二三尺高棚上用細箔遮蓋五六月內炎熱時箔上加苫重蓋惟要隂密不致曬死但地皮稍乾用炊帚細灑水于棚上常令其下濕潤緣子未生芽或苗出力弱而不禁注水徒澆故也遇天隂及早夜撤去覆箔至十日後苗出有草即拔苗高三指不須用棚如地稍乾用微水輕澆約長三寸卻擇比前稍壯地别作畦移栽臨移時隔宿先將有苗畦澆過明旦亦將做下空畦澆過將苧麻苗用刃器帶土掘出轉移在內相離四寸一栽務要頻鋤三五日一澆如此將護二十日之後十日半月一澆至十月後用牛驢馬生糞蓋厚一尺預選秋耕擺熟肥土更用細糞糞過來年春首移栽地氣已動為上時芽動為中時苗長為下時栽法掘區成行方圍相去一尺五寸將畦中科苗移出栽于區內擁土區中以水湮之若夏秋移栽須趂雨水地濕分根連土於側近地內分栽亦可其移栽年深宿根者移時用刀斧將根截斷長可三四指栽時成行作區方圍各離一尺五寸每區臥栽三二根棊盤相對擁土畢然後下水候三五日復澆苗高勤鋤旱則澆之若地遠移栽者須根科少帶元土蒲包封裹外復用席包掩合勿透風日雖數百里外栽之亦活栽培法如前初年長約一尺便割一鎌麻未堪用再候長成所割即堪績用至十月即將割過根楂用驢馬糞蓋厚一尺不致凍死至二月初杷去糞令苗出以後嵗嵗如此壓條滋茂如桑法移栽亦可第三年根科交結稠密不移必漸不旺即將本科周圍稠密新科再依前法分栽每嵗可割三鎌每割時須根傍小芽出土約高五分其大麻即為可割大麻既割其小芽榮長便是下次再割麻也若小芽過高大麻不割不唯小芽不旺又損已成之麻大約五月初一鎌六月半一鎌八月半一鎌唯中間一鎌長疾麻亦最好刈倒時隨即用竹刀或鐵刀從梢分批開用手剝下皮即以刀刮其白瓤其浮上皴皮自去縳作小刊搭於房上夜露晝曝如此五七日其麻自然潔白然後收之若值隂雨即於屋底風道內搭涼去聲恐經雨黑漬故也所剝之麻春夏秋溫暖時分績與常法同若於冬月用溫水潤濕易為分擘不然乾硬難分其績既成纒作纓子于水甕內浸一宿紡車紡訖用桑柴灰淋下水內浸一宿撈出每纑五兩可用一淨水盞細石灰拌勻置于器內停放一宿至來日擇去石灰郤用黍秸灰淋水煮過自然白軟曬乾再用清水煮一度别用水擺拔極淨曬乾逗成纑鋪經緯織造與常法同此麻一嵗三割每畝得麻三十斤少不下二十斤目今陳蔡間每斤價鈔三百文已過常麻數倍善績者麻皮一斤得織一斤細者有一斤織布一匹次一斤半一匹又次二斤三斤一匹其布柔韌潔白比之常布又價高一二倍然則此麻但栽植有成便自宿根可謂暫勞永利矣木棉新添栽木棉法擇兩和不下濕肥地于正月地氣透時深耕三遍擺蓋調熟然後作成畦畛每畦長八步濶一步內半步作畦面半步作畦背深斸二遍用杷耬平起出覆土於畦背上堆積至榖雨前後揀好天氣日下種先一日將已成畦畛連澆三水用水淘過子粒堆于濕地上瓦盆覆一夜次日取出用小灰搓得伶俐看稀稠撒於澆過畦內將元起取出覆土覆厚一指再勿澆待六七日苗出齊時旱則澆溉鋤治常要潔淨穊則移栽稀則不須每步只留兩苗稠則不結實苗長高二尺之上打去衝天心旁條長尺半亦打去心葉葉不空開花結實直待棉欲落時為熟旋熟旋摘隨即攤於箔上日曝夜露待子粒乾取下用鐵杖一條長二尺粗如指兩端漸細如趕餅杖樣用梨木板長三尺濶五寸厚二寸做成牀子逐旋取棉子置於板上用鐵杖旋旋趕出子粒即為淨棉撚織毛絲或棉裝衣服特為輕暖論九榖風土及種蒔時月榖之為品不一風土各有所宜種藝之時早晚又各不同案書禹貢冀州厥土惟白壤厥田惟中中兗州厥土黑墳厥田惟中下青州厥土白墳厥田惟上下徐州厥土赤埴墳厥田惟上中揚州厥土惟塗泥厥田惟下下荆州厥土惟塗泥厥田惟下中豫州厥土惟壤下土墳壚厥田惟中上梁州厥土青黎厥田惟下上雍州厥土惟黃壤厥田惟上上又周禮職方氏揚州荆州其榖宜稻豫州其榖宜五種鄭注黍稷菽麥稻青州其榖宜稻麥兗州其榖宜四種鄭注黍稷稻麥雍州其榖宜黍稷幽州其榖宜三種鄭注黍稷稻冀州其榖宜黍稷并州其榖宜五種鄭注同前合二經觀之雖幽并徐梁互闕所載而九州風土之宜其大凡可見矣然一州之內風土又各有所不同但條目繁多書不盡言耳觸類而求之茍塗泥所在厥田中下稻即可種不必拘以荆揚土壤黃白厥田上中黍稷梁菽即可種不必限于雍冀墳壚黏埴田雜三品麥即可種又不必以并青兗豫為定也若夫時之早晚案齊民要術有上中下三時大率以洛陽土中為凖此亦舉一隅之義爾以周公土圭之法推之洛南千里其地多暑洛北千里其地多寒暑既多矣種藝之時不得不加早寒既多矣種藝之時不得不加遲又山川高下之不一原隰廣隘之不齊雖南乎洛其間山原高曠景氣淒清與北方同寒者有焉雖北乎洛山隈掩抱風日和煦與南方同暑者有焉東西以是為差茍比而同之殆類夫膠柱而鼓瑟矣汜勝之書有言種無期因地為時此不刊之論也表而出之庶覽者有所折衷焉論苧麻木棉大哉造物發生之理無乎不在苧麻本南方之物木棉亦西域所産近嵗以來苧麻藝于河南木棉種於陜右滋茂繁盛與本土無異二方之民深荷其利遂即已試之效令所在種之悠悠之論率以風土不宜為解蓋不知中國之物出于異方者非一以古言之胡桃西瓜是不産于流沙葱嶺之外乎以今言之甘蔗茗芽是不産于牂柯卭筰之表乎然皆為中國珍用奚獨至於麻棉而疑之雖然託之風土種藝之不謹者有之抑種藝雖謹不得其法者亦有之故特列其種植之方于右庶勤于生業者有所取法焉他日功效有成當暑而被纖絺之衣盛冬而襲麗密之服然後知其不為無補矣農桑輯要卷二
