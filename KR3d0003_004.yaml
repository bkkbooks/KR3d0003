body:
  text: 農桑輯要卷四元司農司撰養蠶論蠶性齊民要術春秋考異郵曰蠶陽物大惡水故蠶食而不飲士農必用蠶之性子在連則宜極寒成蛾則宜極暖停眠起宜溫大眠後宜涼臨老宜漸暖入簇則宜極暖收種齊民要術收取繭種必取居簇中者近上則絲薄近地則子不生也務本新書養蠶之法繭種為先今時摘繭一概並堆箔上或因繅絲不及有蛾出者便就出種罨壓熏蒸因熱而生決無完好其母病則子病誠由此也今後繭種開簇時須擇近上向陽或在苫草上者此乃强良好繭農桑要㫖云繭必雌雄相半簇中在上者多雄下者多雌陳志宏云雄繭尖細緊小雌者圓慢厚大另摘出于透風涼房內淨箔上一一單排日數既足其蛾自生免熏罨鑽延之苦此誠胎教之最先若有拳翅秃眉焦腳焦尾熏黃赤肚無毛黑紋黑身黑頭先出末後生者㨂出不用止留完全肥好者勻稀布於連上擇高明涼處置箔鋪連箔下地須灑掃潔淨蠶連厚紙為上薄紙不禁浸浴野語云連用小灰紙更妙候蛾生足移蛾下連屋內一角空豎處立柴草散蛾于上至十八日後西南淨地掘坑貯蛾上用柴草搭合以土封之庶免禽蟲傷食蓋有功于人理當如此農桑要㫖云將蛾作三坑埋種田地內能使地中數年不生刺芥士農必用蠶事之本惟在謹于謀始使不為後日之患也眠起不齊由于變生之不一變生不一由于收種之不得其法故曰惟在謹于謀始擇繭出種者取簇中腰東南明淨厚實繭蛾第一日出者名苗蛾不可用屋中置柴草上放不用蛾次日以後出者可用每一日所出為一等輩各于連上寫記後來下蛾時各為一等輩二日相次為一輩猶可次三日者則不可為將來成蠶眠起不能齊極為患害另作一輩養則可末後出者名末蛾亦不可用鋪連于槌箔上雄雌相配當日可提掇連三五次去其尿也至未時後款摘去雄蛾放在苗蛾一處將母蛾于連上勻布稀稠得所所生子如環成堆者其蛾與子皆不用其餘者生子數足更當就連上令覆養三五日不覆養則氣不足然後將母蛾亦置在雄蛾苗蛾末蛾處十八日後埋之浴連收貯蠶連附嵗時廣記集正歷凡浴蠶種了小繩子搭掛上元日浴畢掛一七日郤收于清涼處著一甕盛貴得清涼令生遲也又臘日取蠶種籠掛桑中任霜露雨雪飄凍至立春收謂之天浴蓋蠶蛾生子有實有妄者經寒凍後不復狂生唯實者生蠶則强健有成也務本新書農家自蛾在連直至臘月內三八日浴連三次比及此時蛾溺毒氣先熏汙八九月甚違胎養之方今後自蛾在連即于無煙通風涼房內桑皮索上單掛不得見日若遇天氣炎熱于午未間將連鋪在涼房淨地上申時郤掛起至十八日後遇天色晴明日未出時汲深井甜水浴連約一頓飯間浸去便溺毒氣依上單掛孕婦並未滿月産婦不得浴連勿用厚衣綿絮包裹勿近銅鐵鹽灰不得用麻繩繫掛如或不忌後多乾死不生本草陳藏器云苧麻近蠶種則蠶不生當遠之三伏內再浴至秋高時兩連用線長綴通作一連索上搭掛庶免秋風磨擦七八月不宜收起早收蠶子不旺至十月天晴收卷桑皮索繫懸之冬至日臘八日依前浴掛長流水為上井花水次之比及月望數連一卷桑皮索繫定庭前立竿高掛以受臘天寒氣又採辰精月華至嵗除夜用五方草同桃符木柤以水同煎放冷元日五更浴連辟諸惡解厭魅宜蠶五方草者馬齒莧是也五月五日于牆頭並屋上或人迹少到處採者佳若春早遲生至天社日重九日採亦同立春後無煙屋內置淨甕一隻細切乾茅草襯底另貯黑豆一二斗上立一絲籰慢卷蠶連三紙桑皮繫之繞籰豎立以紗蓋甕每十數日將連取出略見風日又蛾連大忌煙熏農家少有避煙房舍日值煙氣熏蒸胎先藴熱乘春必變為見桑葉未生多以土豆埋壓蛾遭困苦後必消耗審此病源決合多方救護謂如一村十數家蠶連各自封記社長斂集于無煙處寄放庶免熏埋之苦士農必用浴畢掛時須蠶子向外恐有風相磨損其子冬至日及臘八日浴時無令水極凍浸二日取出水極凍則不能出連年節後甕內豎連須使玲瓏每十數日須日高時一出每隂雨後即便曬曝恐傷濕潤然見風亦不可多時收乾桑葉務本新書秋深桑葉未黃多廣收拾曝乾搗碎于無煙火處收頓春蠶大眠後用士農必用桑欲落時捋葉未欲落捋傷來年桑眼已落者短津味泥封收囤至臘月內搗磨成麵臘月內製者能消蠶熱病甕器內可多收飼蠶餘剩作牛料牛甚美食製豆粉米粉務本新書臘八日新水浸菉豆每箔約半升薄攤曬乾又淨淘白米每箔約半升控乾以上二物背隂收頓野語云臘月造油蠶房內㸃燈諸蟲不入收牛糞務本新書冬月多收牛糞堆聚春月旋拾恐臨時闕少春暖踏成墼子曬乾苫起燒時香氣宜蠶士農必用臘月曝乾至春碾捶碎一半收起一半用水拌勻杵築為墼收蓐草務本新書臘月刈茅草作蠶蓐則宜蠶收蒿梢士農必用收黃蒿豆秸桑梢其餘梢乾徑不臭氣者亦可修治苫薦士農必用榖草黃野草皆可但必令緊密一頭截齊一頭留梢者為苫兩頭齊截者為薦也輕野語云苫用茅草上簇快又不蒸熱治蠶具蠶糧附齊民要術崔實曰三月清明令蠶妾具槌椽箔籠案齊民要術作令蠶妾治蠶室塗隙穴具槌持箔籠士農必用蠶具及繅絲器皿務要寬廣槌箔椽切刀鎌斧軠釡等熱絲則釜宜大冷絲則釜宜小盆欲大其竈臨時治之舂磨米麵蠶忙時不及也蠶室齊民要術修屋欲四面開窗紙糊厚為籬崔實曰三月清明治蠶室塗隙穴務本新書蠶屋北屋為上南屋西屋次之大忌東屋為西照日色又西風非長養之氣至榖雨日先須泥補熏乾豎槌了畢勿透風氣若逼蠶生旋泥者牆壁濕潤多生白醭貼沙之病蠶屋正門須重掛葦簾草薦簷外不必以箔攔夾令時通風日故也屋內東間另用席箔劈夾一間于內生蛾留小門出入上掛蒲簾蓋屋小則容易收火氣停眠前後拆去蛾或于小屋內生之熟火易為烘暖停眠後移入寬快屋內蠶屋須要寬快潔淨通風氣映日陽屋前不宜有大樹密隂南北屋相去宜遠宜安南北窗大忌西窗南北窗上各糊捲窗一眠之後但遇白日晴明若是南風郤捲北窗若有北風郤捲南窗蓋倒溜風氣宜蠶故也假有一家蠶屋三間止養蠶十數箔雖無北窗亦不須創開蓋為蠶少屋寬必無太熱若至二十箔以上決當創開北窗近下安置但是窗上須掛葦簾草薦南簷外先架立搭棚檁柱大眠時搭蓋以隔臨簷熁熱西山牆外另搭趄棚今時多用薥黍秸壁以避滿牆西照蠶屋西南角從柱向南高壘牆壁四五步或夾厚籬障以泥泥飾防大眠之後剪開窗紙恐有西南風起此風大傷蠶陜西河南尤甚趙地以北頗緩要旨云蠶屋地基須高一尺擇地不必以隂陽形勢為法陳志宏云屋基新土填乾于上用泥重覆士農必用修屋宜高廣低則鬱遏多熱勿接撁厦南撁隔陽氣北撁助隂氣蠶生前一月泥飾厚則耐寒熱除正門外每周圍可遍安窗無西窗不妨宜高大每間開壁更好如壁內有通山柱者一壁上分安兩座力不及者勻立直柴枝亦可檁撁之間每一間內各開三照窗長澗皆五六寸許兩山壁窗近上亦各如撁上開照窗大窗先用故紙全糊外各用草薦密封蓋了照窗亦糊捲窗密封窗臺高不過二尺五寸每一間附地透開三風眼如貓竇郤用磚坯蓋塞了泥封固密火倉齊民要術屋內四角著火火若在一處則冷熱不均務本新書生蠶有小屋者四壁挫壘空龕或八或六頗類參星樣一高一下頓藏熟火庶得火氣勻停如大屋內生蠶一邊難就壁龕當于箔查外挫壘土臺或釘木橛上安火盆盆外另夾帷箔收拾火氣蠶小時將牛糞墼子燒令無煙移入龕內頓放如無壁龕等止于槌箔四向約量頓火近兩眠則止若寒熱不均後必眠起不齊又今時蠶屋內素無禦寒熟火止是旋燒柴薪煙氣熏蒸太甚蠶藴熱毒多成黑蔫士農必用治火倉屋當中掘一坑濶狹深淺量屋大小謂如一二間四椽屋四方一面可闊四尺隨屋大小加減坑周圍磚坯接壘高二尺粘泥泥了通計深四尺細碎乾牛糞坑底上鋪攤一層厚三四指臘月所收槌碎者帶根節粗乾柴于糞上鋪一層五寸以上徑者凡桑榆槐等堅硬者皆可柴上又鋪糞一層于柴空隙處築得極實慎不可虛虛則火焰起傷屋又熟火不能久糞柴相間樁坑滿上復用糞厚蓋了約蠶生前七八日糞上煨熟火黑黃煙五七日于蠶蛾生前一日少開門出盡烟即閉了恐暖氣出其柴糞陷下已成熟火蠶小喜暖怕烟不可用生火又生火或驟或歇不能均勻此火既熟絶無烟氣一兩月不減不動便如無火用柴枝剔撥便暖氣熏騰也上必壘高二尺者欲使火氣上騰至空中散布均勻又防夤夜人行誤陷入也其屋乾透其壁皆暖黑婆等諸蟲盡熏了牛糞熏屋大宜蠶也蠶喜牛糞牛喜蠶沙糊窗窗上故紙郤用淨白紙替換糊了外莫捲草薦旋扯故紙糊新紙不使熱氣出去了每一窗嵌四大捲窗宜密安槌齊民要術比至再眠常須三箔中箔上安蠶上下空置下箔障土氣上箔防塵埃士農必用上下二箔上皆鋪切碎稈草中一箔用切碎搗軟稈草為蓐鋪案平勻仍須四邊留箔楂五七寸揉淨紙粘成一段可所鋪蓐大鋪于中箔蓐上揉紙極軟如棉出要旨云底箔須鋪二領蠶蛾生後每日日高捲一領曬至日斜復布于生蠶箔底明日又將底箔撤出曬曝如前翻覆襯藉使受自然陽和之氣停眠起食然後撤去變色務本新書清明將甕中所頓蠶連遷于避風溫室酌中處懸掛太高傷風太下傷土榖雨日將連取出通見風日那表為裏左捲者郤右捲右捲者卻左捲每日交換捲那捲罷依前收頓比及蠶生均得溫和風日生發勻齊要㫖云清明後種初變紅和肥滿再變尖圓微低如春栁色再變蛾周盤其中如遠山色此必收之種也若頂平焦乾及蒼黃赤色便不可養此不收之種也士農必用蠶子變色惟在遲速由己不致損傷自變視桑葉之生以定變子之日須治之三日以色齊為准農語云蠶欲三齊子齊蛾齊蠶齊是也其法桑葉已生自辰巳間于風日中將甕中連取出舒卷提掇舒時連背向日曬至溫不可熱凡一舒一捲時將元捲向外者郤捲向裏元向裏者卻捲向外橫者豎捲豎者橫捲以至兩頭捲來中間相合舒捲無度數但要第一日十分中變灰色者變至三分收了次二日變至七分收了此二日收了後必須用紙密糊封了如法還甕內收藏至第三日于午時後出連舒捲提掇展連手提之凡半日十數遍須要變十分第三次必須至午時後出連者恐第一次先變者先生蛾也蛾生在巳午時之前過午時便不生桑蠶直說欲疾生者頻舒捲捲之須虛慢欲遲生者少舒捲捲之須緊實生蛾士農必用生蛾惟在涼暖知時開掯得法使之莫有先後也生蛾不齊則其蠶眠起至老俱不能齊也其法變灰色已全以兩連相合鋪于一淨箔上緊捲了兩頭繩束卓立于無烟淨涼房內第三日晚取出展箔蛾不出為上若有先出者雞翎掃去不用名行馬蛾留則蠶不齊每三連虛捲為一卷放在新暖蠶房內槌匝下隔箔上候東方白將連于院內一箔上單鋪如有露于涼房中或棚下待半頓飯時移連入蠶房就地一箔上單鋪少間黑蛾齊生並無一先一後者和蛾稱連記寫分兩下蛾齊民要術蠶初生用荻掃則傷蠶博聞録用地桑葉細切如絲髮摻淨紙上卻以蠶種覆于上其子聞香自下切不可以鵝翎掃撥務本新書農家下蛾多用桃杖翻連敲打蛾下之後卻掃聚以紙包裹稱見分兩布在箔上已後節節病生多因此弊今後比及蛾生當勻鋪蓐草蓐宜搗軟塘火內燒棗一二枚先將蠶連稱見分兩次將細葉摻在蓐上續將蠶連翻搭葉上蛾要勻稀連必頻移生盡之後再稱空連便知蠶蛾分兩依此生蠶百無一損今時如下蛾三兩往往止布一席重疊密壓不無損傷今後下蛾三兩決合勻布一箔若分兩多少驗此差分又慎莫貪多謂如己力止合放蛾三兩因為貪多便放四兩以致桑葉房屋椽箔人力柴薪俱各不給因而兩失士農必用下蛾惟在詳款稀勻使不致驚傷而稠疊是時蠶母沐浴淨衣入蠶屋蠶屋內焚香又將院內雞犬孳畜逐向遠處恐驚新蛾也蛾生既齊取新葉用快利刀切極細須下蛾時旋切則葉查上有津若鈍刀預切下則查乾無津用篩子篩于中箔蓐紙上務要勻薄須用篩子乃能勻不勻則食偏篩用竹編葦子亦可秫黍䕸亦可如小碗大篩底方眼可穿過一小指也將連合于葉上蛾自緣葉上或多時不下連及緣上連背翻過又不下者並連棄了此殘病蛾也一箔蓐上下蛾三兩蠶至老可分三十箔每蛾一錢可老蠶一箔也係長一丈濶七尺之箔如箔小可減蛾下蛾多則蠶稠為後患也養蠶過三十箔者可更加下蛾箔養蠶少者用筐可也蓐如前法涼暖總論齊民要術調火令冷熱得所熱則焦燥冷則長遲務本新書春蠶時分一晝夜之間比類言之大概亦分四時朝暮天氣頗類春秋正晝如夏深夜如冬既是寒暄不一雖有熟火各合斟量多寡不宜一體自蛾初生相次兩眠蠶屋內正要溫暖蠶母須著單衣以身體較若自身覺寒其蠶必寒便添熟火若自身覺熱其蠶亦熱約量去火一眠之後但天氣晴明巳午未之間暫捲起門上薦簾以通風日免致大眠起後飼罷三頓投食剪開窗紙時陡見風日乍則必驚後多生病古人云貧家悟得養子法蓋是多在露地慣見風日之故蠶亦如此至大眠後蠶長十分葉增十倍蓐廣沙多自然發熱加之天氣炎熱蠶屋內全要風涼三頓投食罷宜捲起簾薦剪開窗紙門口置甕旋添新水以生涼氣倘遇猛風暴雨或夜氣太涼卻將簾薦暫時放下士農必用加減涼暖蠶成蛾時宜極暖是時天氣尚寒大眠後宜涼是時天氣已暄又風雨隂晴之不測朝暮晝夜之不同一或失應蠶病即生惟蠶屋得法則可以應之屋之制周置捲窗中伏熟火謂如蠶欲暖而天氣寒閉苫窗撥火則外寒不入和氣內生若遇大寒屢撥熟火不能勝其寒則外燒糞墼絶烟置屋中四隅和氣自然熏蒸寒退則去餘火蠶欲涼而天氣暄閉火而捲苫窗則火氣內息而涼氣外入若遇大熱盡捲苫窗不能解其熱則去其窗紙上捲照窗下開風眼窗外槌下灑潑新水涼氣自然透達熱退則糊補其窗閉塞風眼使其蠶自初及終不知有寒熱之苦病少繭成一室之功也然寒不可驟加暖熱當漸漸益火寒而驟熱則黃軟多疾熱不可驟加風涼當漸漸開窗熱而驟風涼則變殭此又不可不知也又正熱猛著寒便禁口不食即用𨫼子盛無烟熟牛糞火用杈托火𨫼于槌箔下往來辟去寒氣蠶自食葉也飼養總論務本新書蠶必晝夜飼若頓數多者蠶必疾老少者遲老二十五日老一箔可得絲二十五兩二十八日老得絲二十兩若月餘或四十日老一箔止得絲十餘兩飼蠶者慎勿貪眠以懶為纍每飼蠶後再宜繞箔巡視若有薄處必再摻令勻若值隂雨大寒比及飼蠶先用去葉稈草一把㸃火繞箔四向照過逼去寒濕之氣然後飼蠶蠶不生病一眠候十分眠才可住食至十分起方可投食若八九分起便投食直到蠶老決都不齊又多損失停眠至大眠蠶欲向眠若見黃光便合擡解住食直候起時慢慢飼葉宜輕摻若蠶白光多是困餓宜細細飼之猛則多傷若蠶青光正是蠶得食力勿令少葉急須勤飼今時農家停眠至大眠眠蠶大半蠶母猶自摻葉直候都眠或有起者才方住食不知先眠之蠶被葉罨蓋多時以漸不能退皮至大眠起後多是往來遊走直到入簇決都不齊葉忌濕忌熱蠶食濕葉多生瀉病食熱葉則腹結頭大尾尖當蓋小屋或趄棚頓放雨露濕葉控去濕潤然後飼蠶士農必用飼養之節惟在隨蠶所變之色而為之加減厚薄後擘黑及三眠條內隨色加減食法具此條注內使無過不及也蛾生色黑三日後漸變白則向食少加厚變青則正食宜益加厚雖飽亦不傷復變白則慢食宜少減變黃則短食謂之向眠宜愈減純黃則住食謂之正眠眠起自黃而白自白而青自青復白自白而黃又一眠也凡眠起變色例如此時當減食飼之過則傷傷則禁口不食生病而眠遲時當正食飼之不及則餒餒則氣弱而生病亦眠遲而又繭薄也用葉蠶不可食之葉有三一承帶雨露既濕又寒食則變褐色生水瀉臨老則浸破絲囊不可抽繅製之之法芟葉實積苫席覆之少時內發蒸熱審其得所啓苫覆而攤之濕氣隨化葉亦不寒即可飼之也二為風日所蔫乾者生腹結三浥臭者即生諸疾斯二者無可製之法棄之可也韓氏直說抽飼斷眠法蠶向眠時量黃白分數抽減所飼之葉漸次細切薄摻頻飼如十分中有三分黃光者即十分中減葉三分比尋常稍宜細切薄摻頓數亦宜稍頻如十分中有五分黃光即減五分比先次又細切薄摻其頓數更宜加頻如十分中有八分黃光即減去八分比先次切令極細摻令極薄其頓亦令極頻候十分黃光不問隂晴早夜急須擡過豫備箔蓐可無失誤擡過時住食起齊時投食此為抽飼斷眠之法謂抽減眠蠶之葉不致覆壓專飼未眠之蠶使之速眠不惟眠起得齊且無葉罨燠熱之病前人謂學取抽飼斷眠法年年嵗計得絲蠶不可不知也分擡總論務本新書擡蠶須要衆手疾擡若箕內堆聚多時蠶身有汗後必病損漸漸隨擡減耗縱有老者簇內多作薄皮蠶沙宜頓除不除則久而發熱熱氣熏蒸後多白殭每擡之後箔上蠶宜稀布稠則强者得食弱者不得食必繞箔遊走又風氣不通忽遇倉卒開門暗值賊風後多紅殭布蠶須要手輕不得從高摻下如或高摻其蠶身遞相擊撞因而蠶多不旺已後簇內懶老翁赤􅀈是也要旨云蠶有白殭是小時隂氣蒸損天晴急用簸箕三四具轉蠶中庭使日氣煦照擡一箔則復布一箔得日氣則盡解矣者野語云蠶燠乾鬆者其蠶無病蠶燠成片濕潤白積蠶為有病速宜擡解如正可擡卻遇隂雨風冷則不敢擡用茅草細切如豆每一箔可用一斗或二斗勻撒蠶上上再摻葉移時蠶因食葉沿上其茅草能隔燠熱天晴再擡如無茅草稈草次之士農必用分擡之便惟在頻款稀勻使不致蒸濕損傷也蠶滋多必須分之沙燠厚必須擡之失分則不勝稠疊失擡則不勝蒸濕故宜頻蠶者柔軟之物不禁觸弄小而分之猶能愛護大而擡之莫能顧惜也未免久堆亂積遠擲高拋生病損傷實由于此故宜安款而稀勻或有不齊頻飼以督其後者使之相及而各取其齊也蠶眠不齊病原于初今既然矣當從此治之如于純黃之中雜見其退白而向黃者是與純黃不相懸遠頻飼以督之則猶得相及飼頻則可速其眠故爾如已見純黃又多青白此與純黃既遠雖飼之之頻則亦莫及蓋蠶之變色為變之小其眠則絶食退膚為變之大也為蛹為蛾則變之尤大而至于化也凡至純黃則結嘴不食而眠如人之大病周身之氣血一為變換一晝夜靜安不擾則眠為得所今以青白者尚多飼而亂之動而蹂之則眠者失其所矣比其青白者變黃而向眠則此已過眠而動起動起之初欲得少食亦如人之病起欲得少食以接氣血也以後者方眠勒其食而不投以困以餓又必待後者動起而飼之多病少絲端為可惜故蠶經云眠起不齊絲減半良謂此也初飼蛾務本新書初飼蛾法宜旋切細葉微篩切刀宜快快則粗細勻停不住頻飼一時辰約飼四頓一晝夜通飼四十九頓或三十六頓懶者頗疑煩冗豫曰新蛾止食桑葉脂脈若頓數不多譬如嬰兒小時失乳後必羸弱病生蛾初生須隔夜採東南枝肥葉甕中另頓旋取細切士農必用飼蛾之法當宿澆其桑旋摘其葉宿澆則多液旋摘則不乾利刃以細切之疏篩以薄布之非利刃則無液非細切則蓋蛾非篩則不勻非勻則偏食然葉楂之微液不能久存少頃之間即成枯乾故須旋切而頻篩也第一日飼一復時可至四十九頓第二日飼至三十頓葉微加厚第三日飼至二十餘頓又稍加厚宜極暖宜暗大凡初蛾宜暗眠宜暗將眠及眠起宜微明向食宜明後皆倣此擘黑士農必用擘黑法第三日巳午時間于别槌上安三箔如前初安槌法微帶燠薄揭蛾款手擘如小棊子大布于中箔可盈滿不留楂也可漸漸加葉飼早晴可捲東窗苫蠶喜東照及當日背風窗自此後常日宜如此天隂早暮且不宜至夜則閉凡迎風窗苫及西照窗户不可開蠶畏風也後皆倣此雖大眠後喜涼亦可以避其猛風也漸漸變色隨色加減食至純黃則不飼是謂頭眠不以早晚擡過頭眠擡飼士農必用擡頭眠蠶眠結嘴不食皮膚退換蠶之一變也别槌上鋪四箔上下隔塵潤中二箔安蠶用蓐如前薄帶沙燠揭蠶分如大棊子大布滿中二箔沙燠厚則蒸蠶生病一復時可六頓次日可漸漸加葉可開捲窗一半初向黃時宜極暖眠定宜暖起齊宜微暖擡頭眠飽食正食時擡名擡飽食分如小錢大布滿三箔辨色加减食停眠擡飼士農必用擡停眠分如小錢微大布滿六箔起齊頭食宜薄一復時可四頓次日可漸加葉辨色加减或全開捲窗惟避當風窗初向黃時宜暖眠定宜微暖起齊宜溫擡停眠飽食如前法蠶可撥可摻不須分揭可布滿十二箔然不可高拋遠擲恐損蠶身變色加減食大眠擡飼務本新書大眠起燠宜頻除蠶宜頻飼或西南風起將門窗簾薦放下此際不宜擡解箔上布蠶須相去一指布蠶一箇取臘月所藏菉豆水浸微生芽曬乾磨作細麵臘月所藏白米蒸熟作粉亦可第四頓投食拌葉勻飼解蠶熱毒絲多易繅堅韌有色如葉少去秋所收桑葉再搗為末水灑新葉微濕摻末拌勻接闕飼蠶比食豆麵係本食之物又萬苣亦可接闕蠶屋南簷外先所架立搭棚檁柱此時搭蓋士農必用擡大眠分如折二錢大布滿二十五箔起齊投食一復時可三頓第一頓宜薄但可覆白第二頓比前又薄不覆白第三頓如第一頓覆白此三頓食如不短則其蠶至老食慢次日可漸加葉辨色加減頓數可全開捲窗照窗過熱則更劙開窗紙但不至熱則不拘此例初向黃時宜微暖眠定宜溫起齊宜涼落蓐大眠起投食後第六七頓可落蓐全去沙燠蓐草也即是擡飽食可分至三十箔辨色加減食正食時每飼後可挾葉筐繞槌巡之但見箔上有斑黎處即摻葉補合蠶至大眠後正食時闕一分葉即減一分絲也但見有班黎處是蠶先食透葉也即當補合不如此則後來多有薄繭也拌米粉臘月內成造者至第七八頓食後于巳午時間將切下葉攤在葉上新水灑拌極勻待少時細羅白粉子拌令極勻每葉一筐用新水一升粉子四兩如無止用新水一筐可飼一箔所有之蠶皆可飼一頓拌葉麵令蠶體充實為繭堅厚為絲堅韌也切葉灑拌新水極勻羅桑麵拌勻于大眠後間飼三五頓假令每頓飼葉二筐今止用一筐減葉一半如蠶盛葉闕大眠後間飼之五頓亦無妨蠶食不闕不可用擡沙于大眠後飼食第十一二頓間可擡擡如前法全去沙燠不如此則不禁蒸鬱臨老生病難以抽繅蠶欲老飼之宜細薄宜頻養老如養小亦如人老頓食則傷若不如此則食葉不淨其葉蒸濕帶葉入簇所結繭亦濕潤如經鹽水此名簇汗繭難抽繅宜微暖如人老不禁寒涼然亦可相度當如天氣涼暖消息斟酌大意比大眠後未老時宜微暖也依按其法蠶自蛾至老不過二十四五日過此日數愈多桑愈費而絲愈少也韓氏直說蠶自大眠後十五六頓即老得絲多少全在此數日葉足則絲多不足則絲少見有老者依抽絲斷眠法飼之候十蠶九老方可就箔上撥蠶入簇如是則無簇汗蒸熱之患繭必早作硬而多絲養蠶無巧食足便老養四眠蠶蠶桑直說此蠶别是一種與養春蠶同但第三眠止擡開十五箔擡飽食二十箔大眠擡三十箔稙蠶之利韓氏直說稙蠶疾老少病省葉多絲不惟收卻今年蠶又成就來年桑稙蠶生于榖雨不過二十三四日老方是時桑葉發生津液上行其桑斫去比及夏至夏至後一隂生津液不上行可長月餘其條葉長盛過于往嵗至來年春其葉生又早矣積年既久其葉愈盛蠶自早生晚蠶之害韓氏直說晚蠶遲老多病費葉少絲不惟晚卻今年蠶又損卻來年桑世人惟知婪多為利不知趨早之為大利壓覆蠶連以待桑葉之盛其蠶既晚明年之桑其生也尤晚矣十體務本新書寒熱飢飽稀密眠起緊慢謂飼時緊慢也三光蠶經白光向食青光厚飼皮皺為飢黃光以漸住食八宜韓氏直說方眠時宜暗眠起以後宜明蠶小并向眠宜暖宜暗蠶大并起時宜明宜涼向食宜有風避迎風窗開下風窗宜加葉緊飼新起時怕風宜薄葉慢飼蠶之所宜不可不知反此者必不成矣三稀蠶經下蛾上箔入簇五廣蠶經一人二桑三屋四箔五簇謂苫席蒿梢等雜忌務本新書忌食濕葉忌食熱葉蠶初生時忌屋內掃塵忌煎煿魚肉不得將煙火紙撚于蠶屋內吹滅忌側近舂搗忌敲擊門窗槌箔及有聲之物忌蠶屋內哭泣叫喚忌穢語淫辭夜間無令燈火光忽射蠶屋窗孔未滿月産婦不宜作蠶母蠶母不得頻換顔色衣服洗手長要潔淨忌帶酒人切桑飼蠶及擡解布蠶蠶生至老大忌煙熏不得放刀于竈上箔上竈前忌熱湯潑灰忌産婦孝子入家忌燒皮毛亂髮忌酒醋五辛羶腥麝香等物士農必用忌當日迎風窗忌西照日忌正熱著猛風驟寒忌正寒陡令過熱忌不淨潔人入蠶室蠶屋忌近臭穢簇蠶齊民要術蠶老時值雨者則壞繭宜于屋內簇之薄布薪于箔上散蠶訖又薄以薪覆之一槌得安十箔務本新書簇蠶地宜高平內宜通風勻布柴草布蠶宜稀密則熱熱則繭難成絲亦難繅東北位并食六畜處樹下坑上糞惡流水之地不得簇野語如天氣暄熱不宜日午簇蠶蠶老不禁日氣曬暴故也士農必用治簇之方惟在乾暖使內無寒濕簇中繭病有六一簇汗二落簇三遊走四變赤蛹五變殭六黑色簇汗之病蠶老食葉不淨其葉蒸濕帶葉入簇故繭亦濕潤此為簇汗其餘五病皆地濕天寒所致蠶欲老可簇地盤燒令極乾除掃灰浮于上置簇韓氏直說安圓簇于阜高處打成簇腳一簇可六箔蠶十分中有九分老者宜少摻葉名上馬桑就箔上用簸箕般去宜款手摻于簇上自東南起頭不令落地務令稀勻上復覆蒿梢或豆䕸復摻蠶如前至三箔復梢倒根在上如此則簇圓又穩自後蠶可近上摻至六箔覆蒿令簇圓上用箔圍苫繳簇頂如亭子樣防雨至晚又用苫將簇從下繳至上苫相接日出高時捲去至晚復繳三日外繭成不用馬頭簇亦依上苫繳柴薪要廣簇又玲瓏中間宜架杆蠶多宜馬頭簇簇腳宜南北曬簇上蠶後第三日辰巳時間開苫箔日曬至未時復苫蓋如前如當日過熱上搘單箔遮日色翻簇上蠶時被雨霑濕雨才止才晴即選一簇地盤如雨濕了則取乾牆土厚覆治簇之法如前不以成繭不成繭翻騰遷移别簇封苫如前小雨則不須但可曬曝又有一法臨簇有兩只于蠶屋中本槌下地面上安簇開了門窗使透風氣早夜或隂雨變寒則閉門窗添牛糞火比翻簇之法又為妙也又一法槌箔上虛撒蒿槌周圍簇稍與蒿箔苫圍之蠶自作繭猶勝于雨中簇也搘音支擇繭務本新書繭宜併手忙擇涼處薄攤蛾自遲出免使抽繅相逼繅絲士農必用繅絲之訣惟在細圓勻緊使無褊慢節核接頭為節疙疸為核粗惡不勻也生繭繅為上如人手不及殺過繭慢慢繅殺繭法有三一日曬二鹽浥三蒸蒸最好人多不㑹日曬損繭鹽浥者穩熱釜可繅粗絲單繳者雙繳亦可但不如冷盆所繅者潔淨光瑩也釜要大置于竈上釜上大盆甑接口添水至甑中八分滿甑中用一板攔斷可容二人對繅也繭少者止可用一小甑水須熱宜旋旋下繭多下則繅不及煮損冷盆可繅全繳細絲中等繭可繅雙繳比熱釜者有精神而又堅韌雖曰冷盆亦是大溫也盆要大必須先泥其外口徑二尺五寸之上者豫先翻過用長粘泥泥底並四圍至唇厚四指將至唇漸薄日曬乾名為串盆用時添水八九分滿水宜溫暖常勻無令乍寒乍熱釜要小口徑一尺以下者小則下繭少繭欲頻下多下則煮過又不勻也突竈半破磚坯圓壘一遭中空直桶子樣其高比繅絲人身一半其圓徑相盆之大小當中壘一小臺徑比盆底小坐串盆于小臺上其盆要比圓壘高一唇靠元壘安打絲頭小釜竈比圓壘低一半掩火透圓壘竈子後火烟過處名掩火與掩火相對圓壘匝近上開烟突口做一臥突長七八尺已上先于安突一面壘一臺比突口微低又相去七八尺外安一臺髙五尺或就用牆或用木為架子用長一丈椽二條斜磴在二臺上二椽相去濶一磚坯許用磚坯泥成一臥突二椽上平鋪磚坯一層兩邊側立上復平蓋泥了便成一臥突也須與竈口相背謂如竈口向南突口向北是也繅盆居中火衝盆底與盆下臺烟焰繞盆過烟出臥突中故得盆水常溫又勻也又得烟火與繅盆相遠其繅絲人不為烟火所逼故得安詳也軠車床高與盆齊軸長二尺中徑四寸兩頭三寸用榆槐木四角或六角臂通長一尺五寸六角不如四角軠角少則絲易解臂者輻條也或雙輻或單輻雙輻者穩須腳踏又繅車竹筒子宜細細似織絹穗筒子鐵條子串筒兩樁子亦須鐵也兩豎樁子上橫串鐵條鐵條穿筒子既輕又利也不如此則不能成絶妙好絲古人有言工欲善其事必先利其器餘如常法打絲頭用一人小釜內添水九分滿竈下燃粗乾柴柴細旋添火不勻停候火大熱下繭于熱水內下繭宜少不宜多多則煮過繅絲少用筋輕剔撥令繭滾轉蕩勻挑惹起囊頭粗絲頭名囊頭手捻住于水面上輕提掇數度復提起其囊頭下即是清絲摘去囊頭如重手攪撥囊頭又于手拐子纒數遭可長五七尺將繭上好絲十分中去了二三分實為可惜如輕手剔撥起囊頭長不過一尺也一手撮捻清絲一手用漏杓綽繭欵送入溫水盆內杓底上多鏤眼子為漏杓漏瓢更好將清絲挂在盆外邊絲老翁上盆邊釘插一橛子名絲老翁繅絲用一人將絲老翁上清絲約十五絲之上黃絲粗減繭數總為一處穿過錢眼錢下繭攢聚名絲窩又名絮盤繳過䈏頭蛾眉杖子上兩繳杖子下兩繳挂于軠上又取絲老翁上清絲如前挂于軠上兩箇絲窩其頭齊行右腳踏軠右轉長切照覷撥掠兩絲窩于內有繭絲先盡蛹子沈了者繭絲斷了繭浮出絲窩者其絲窩減小即取清絲約量添加務要兩絲窩大小長均眼轉覷手頻撥頻添添不過三四絲失添則細了多添則粗了如或手添不迭腳慢踏軠其絲較爭粗如或手添得多了腳緊踏軠其絲較爭細手腳相應亦可取勻也添絲搭在絲窩上便有接頭將清絲用指面喂在絲窩內自然帶上去便無接頭也此名全繳絲圓緊無疙㾑上等也中作紗羅上等匹緞如蛾眉杖上只兩繳名雙繳絲不甚圓緊有小疙㾑中等也不中紗羅中中等緞匹如蛾眉杖上只一繳名單繳絲又名歇口絲褊慢有大疙㾑不中匹緞只中絹帛亦不堅壯此單絲歇口絲多只是熱釡中繅也蒸餾繭法韓氏直說如蠶成繭硬紋理粗者必繅快此等繭可以蒸餾繅冷盆絲其繭薄紋理細者必繅不快不宜蒸餾此止宜繅熱盆絲其蒸餾之法用籠三扇用軟草札一圈加于釡口以籠兩扇坐于上其籠不論大小籠內勻鋪繭厚三四指許頻于繭上以手背試之如手不禁熱可取去底扇卻續添一扇在上亦不要蒸得過了過了則軟了絲頭亦不要蒸得不及不及則蛾必鑽了如手背不禁熱恰得合宜于蠶房槌箔上從頭合籠內繭在上用手微撥動如箔上繭滿打起更攤一箔候冷定上用細栁梢微覆了其繭只于當日都要蒸盡如蒸不盡來日必定蛾出釜湯內用鹽一兩油半兩所蒸繭不致乾丫絲頭如餾繭多油鹽旋旋入夏秋蠶法齊民要術淮南子曰原蠶一嵗再登非不利也然王者法禁之為其殘桑也務本新書凡養夏蠶止須些小以度秋種慮恐損壞萌條有誤明年春蠶桑葉今時養熱蠶以紙糊窗因避飛蠅遮盡往來風氣天晴罨熱病生隂則濕生白醭隂晴俱不便當以紗糊窗陳稈草作蓐紙條先貼紗邊餘紙就糊窗上中間以線繫紗在窗櫺上蠶罷以水潤紙揭下明年再用或用荻簾粗麻線繫織當窗繫定遮蔽飛蠅透脫風氣另闢一房不令雜人出入決安南北窗以剪剪葉旦暮擡分兼夜頻飼秋蠶初生時去三伏猶近暑氣仍存蠶屋多生濕潤正要四通八達風氣往來蓋初生卻要涼快以陳稈草作蓐勿用麥秸一日一擡失擡多生白醭一眠宜溫再眠如春門窗俱挂薦簾屋內須用無烟熟火大眠全要暄暖大忌北風寒氣勿飼雨露冷葉春秋蠶法首尾顛倒深宜體測簇蠶時相次秋高恐值夜寒風冷不能作繭可于簇西北埋柱繫椽箔遮禦北風寒氣三兩夜之間便可作繭士農必用夏蠶此别是一等俗謂三生蠶春養出夏種夏養出秋種秋養出來春種不可間闕闕則絶其種自蛾至老俱宜涼忌蠅蟲先于蠶生前用麥糠擁于蠶房壁腳燒之去濕氣及諸蟲子擘黑後須一日早晨一擡其餘並與養春蠶同此蠶不可多養止欲收秋蠶種多則損葉然只可科採桑中冗條取葉也秋蠶一名原蠶捋葉不無傷桑春蠶不幸遇天災不得已養之以補嵗計然不宜稙宜稚也初宜涼漸漸宜暖與養春蠶正相反其間體候須欲得所初可摘葉蠶大則捋葉初用紗糊窗漸漸天寒上復用紙糊留捲窗簇與繅絲法如前要㫖熱蠶捶底亦宜用麥糠麥䕸燒之又大路上踏踐起乾塵土收三四石生蠶日于槌底攤平可避暑濕簇秋蠶多于簇心用熟火或致焚燒不若止于映北風處為簇簇底用麥䕸均鋪簇則用乾桑柴為梢新乾黍䕸為草得自然溫暖之氣不須用火矣經雨則倒簇農桑輯要卷四
