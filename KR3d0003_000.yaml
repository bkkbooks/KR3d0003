body:
  text: 農桑輯要農家類提要臣等謹案農桑輯要七卷元世祖時官撰頒行本也前有至元十年翰林學士王磐序稱詔立大司農司不治他事専以勸課農桑為務行之五六年功效大著農司諸公又慮夫播植之宜蠶繅之節未得其術於是遍求古今農家之書刪其繁重托其切要纂成一書鏤為板本進呈將以頒布天下云云案元史司農司設於至元七年分布勸農官巡行郡邑察舉農事成否達於户部以殿最牧民長官史又稱世祖即位之初首詔天下崇本抑末於是頒農桑輯要之書於民均與王磐所言合惟至元七年至十年不足五六年之數盤蓋據建議設官之始約略言之耳焦竑國史經籍志錢曾讀書敏求記皆作七卷永樂大典所載僅有二卷蓋編纂者所合併非有闕佚永樂大典又載有至順三年印行萬部官牒蘇天爵元文類又載有蔡文淵序一篇稱延祐元年仁宗特命刋板於江浙行省明宗文宗復申命頒布蓋有元一代以是書為經國要務也書凡分典訓耕墾播種栽桑養蠶瓜菜果實竹木藥草孳畜十門大致以齊民要術為藍本芟除其浮文瑣事而雜採他書以附益之詳而不蕪簡而有要於農家之中最為善本當時著為功令亦非漫然矣乾隆四十二年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書子部四農桑輯要目録農家類卷一典訓農功起本蠶事起本經史法言先賢務農耕墾耕地代田區田卷二播種收九榖種種榖大小麥青稞附水稻旱稻黍穄稗附梁秫大豆豍豆附小豆菉豆白豆附豌豆薥黍蕎麥胡麻麻子蘇子附麻苧麻木棉論九榖風土及種蒔時月論苧麻木棉卷三栽桑論桑種種椹地桑移栽壓桑栽條栽桑梢布行桑修蒔治蟲蠧等法附科斫採葉附接廢樹接大小樹義桑桑雜類柘卷四養蠶論蠶性收種擇繭浴連收貯蠶連附收乾桑葉製豆粉米粉收牛糞收蓐草收蒿梢修治苫薦治蠶具蠶糧附蠶室火倉安槌變色生蛾下蛾涼暖總論飼養總論用葉分擡總論初飼蛾擘黑頭眠擡飼停眠擡飼大眠擡飼養四眠蠶稙蠶之利晚蠶之害十體三光八宜三稀五廣雜忌簇蠶擇繭繅絲蒸餾繭法夏秋蠶法卷五瓜菜種瓜黃瓜附治瓜籠法區種瓜法西瓜冬瓜瓠芋葵茄子蔓菁蘿蔔胡蘿蔔附蜀芥藝薹芥子薑菌子蒜䪥薤同葱韭胡荽菠薐萵苣同蒿人莧藍菜莙薘蘭香香菜附荏蓼芹􅛧甘露子豆豉麩豉果實種梨插梨附藏梨法桃櫻桃蒲萄附李梅杏奈林檎棗㮕棗附栗榛附柿安石榴木瓜銀杏橙橘樝子諸果接諸果卷六竹木種竹松杉柏檜附榆白楊棠榖楮槐栁楸梓梧桐漆柞皂莢楝椿葦荻附蒲作園籬諸樹伐木藥草種紫草紅花藍梔子茶椒茱萸茴香蓮藕芡芰薯蕷地黃枸杞菊花蒼术黃精百合牛蒡子決明甘蔗薏苡藤花薄荷罌粟苜蓿卷七孳畜養馬牛總論馬驢騾附牛水牛附羊豬養雞鵝鴨魚蜜蜂嵗用雜事農桑輯要原序聖天子臨御天下欲使斯民生業富樂而永無饑寒之憂詔立大司農司不治他事而專以勸課農桑為務行之五六年功效大著民間墾闢種藝之業增前數倍農司諸公又慮夫田里之人雖能勤身從事而播殖之宜蠶繅之節或未得其術則力勞而功寡獲約而不豐矣於是遍求古今所有農家之書披閲參考刪其繁重托其切要纂成一書目曰農桑輯要凡七卷鏤為版本進呈畢將以頒布天下屬豫題其卷首豫嘗讀豳詩知周家所以成八百年興王之業者皆由稼穡艱難積纍以致之讀孟子書見其論說王道丁寧反覆皆不出乎夫耕婦蠶五雞二彘無失其時老者衣帛食肉黎民不饑不寒數十字而已大哉農桑之業真斯民衣食之源有國者富强之本王者所以興教化厚風俗敦孝悌崇禮讓致太平躋斯民於仁壽未有不權輿於此者矣然則是書之出其利益天下豈可一二言之哉施於家則陶朱猗頓之寶術也用於國則周成康漢文景之令軌也又何待夫序引贊揚而後知其可重哉至元癸酉嵗季秋中旬日翰林學士王磐題
