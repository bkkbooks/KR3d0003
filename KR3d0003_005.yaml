body:
  text: 農桑輯要卷五元司農司撰瓜菜種瓜黃瓜附齊民要術收瓜子法常嵗嵗先取本母子瓜截去兩頭止取中央子本母子者瓜生數葉便結子子復早熟用中輩瓜子者蔓長二三尺然後結子用後輩子者蔓長足然後結子子亦晚熟種早子熟速而瓜小種晚子熟遲而瓜大去兩頭者近蒂子瓜曲而細近頭子瓜短而喎日又收瓜子法食瓜時擇美者收取即以細粳拌之曝向燥挼而簸之淨而且速也良田小豆底佳黍底次之刈訖即耕頻翻轉之二月上旬種者為上時三月上旬為中時四月上旬為下時五月六月上旬可種藏瓜凡種瓜法先以水淨淘瓜子以鹽和之鹽和則不能死先臥鋤耬卻燥土不耬者坑雖深大常雜燥土故瓜不生然後掊蒲溝切坑大如斗口納瓜子四枚大豆三箇于堆旁向陽中瓜生數葉搯去豆瓜性弱苗不能獨生故須大豆為之起土瓜生不去豆則豆反扇瓜不得滋茂但豆斷汁出更成良潤勿拔之拔之則土虛燥也多鋤則饒子不鋤則無實五榖蔬菜果蓏之屬皆如此也蓏郎果反黃瓜一名胡瓜四月中種之宜豎柴木令引蔓緣之考案黃瓜一條原本誤入治瓜籠法中據目録小注之當在此條之末今校正治瓜籠法齊民要術旦起露未解以杖舉瓜蔓散灰于根下後一兩日復以土堆其根則永無蟲矣又摘瓜法在步道上引手而取勿聽浪人踏瓜蔓及翻覆之若無茇而種瓜者地雖美好正得長苗直引無多槃岐故瓜少子若無茇處豎乾柴亦得凡瓜所以早爛者皆由腳躡及摘時不慎翻動其蔓故也若以理慎護及至霜下葉乾子乃盡矣區種瓜法齊民要術六月雨後種菉豆八月中犂㽢殺之十月又一轉即十月終種瓜率兩步為一區坑大如盆口深五寸以土壅其畔如菜畦形坑底必令平正以足踏之令其保澤以瓜子大豆各十枚遍布坑中瓜子大豆兩物為雙藉其起土故也以糞五升覆之亦令均平又以土一斗薄散糞上復以足微躡之冬月大雪時速併力推雪於坑上為大堆至春草生瓜亦生莖葉肥茂異於常者且常有潤澤旱亦無害五月瓜便熟其掐豆鋤瓜之法與常同若瓜子盡生則大穊宜掐去之一區四根即足矣又法冬天以瓜子數枚納熱牛糞中凍即拾聚置之隂地量地多少以足為限正月地釋即耕逐畼布之率方一步下一斗糞耕土覆之肥茂早熟雖不及區種亦勝凡瓜遠矣有蟻者以牛羊骨帶髓者置瓜科左右待蟻附將棄之棄二三則無蟻矣案此條首行原本脫去齊民要術書名今校增崔實曰十二月臘時祀炙萐所甲切樹瓜田四角去蚶胡濫反瓜中蟲謂之蚶龍魚河圖曰瓜有兩鼻殺人博聞録種花藥最忌麝瓜尤忌之賸栽數株蒜薤遇麝不損西瓜新添西瓜種同瓜法科宜差稀多種者熟地垡頭上漫擲撈平苗出之後根下擁作土盆欲瓜大者一步留一科科止留一瓜餘蔓花皆掐去瓜大如三斗栲栳冬瓜齊民要術種冬瓜法傍牆隂地作區圓二尺深五寸以熟糞及土相和正月晦日種二月三月亦得既生以柴木倚牆令其緣上旱則澆之八月斷其梢減其實一本但留五六枚多留則不成也十月霜足收之早收則爛冬瓜越瓜瓠子十月區種如種瓜法冬則堆雪著區上為堆潤澤肥好乃勝春種瓠今名胡蘆古通曰瓠齊民要術泛勝之書曰區種瓠法收種子須大者若先受一斗者得收一石受一石者得收十石先掘地作坑方圓深各三尺用蠶沙與土相和令中半若無蠶沙生半糞亦得著坑中足躡令堅以水沃之候水盡即下瓠子十顆復以前糞覆之既生長二尺餘便總聚十莖一處以布纒之五寸許復用泥泥之不過數日纒處便合為一莖留強者餘悉掐去引蔓結子子外之條亦掐去之勿令蔓延留子法初生二三子不佳去之取第四五六區留三子即足旱時須澆之坑畔周匝小渠子深四五寸以水停之令其遙潤不得坑中下水家政法曰二月可種瓜瓠四時類要種大葫蘆二月初掘地作坑方四五尺深亦如之實填油麻菉豆秸秸同及爛草等一重糞土一重草如此四五重向上尺餘著糞土種十來顆子待生後㨂取四莖肥好者每兩莖肥好者相貼著相貼處以竹刀子刮去半皮以刮處相貼用麻皮纏縛定黃泥封裹一如接樹之法待相著活後各除一頭又取所活兩莖準前刮去皮相著一如前法待活後唯留一莖四莖合為一本待著子㨂取兩箇周正好大者餘有旋旋除去食之如此一斗種可變為盛一石物大此莊子魏惠王大瓠之法芋齊民要術泛勝之書曰種芋區方深皆三尺取豆箕音其豆莖內區中足踐之厚尺五寸取區上濕土與糞和之內區中萁上令厚尺二寸以水澆之足踐令保澤取五芋子置四角及中央足踐之旱數澆之萁爛芋生子皆長三尺一區收三石又種芋法宜擇肥緩土近水處和柔糞之二月注雨可種芋率二尺下一本芋生根欲深劚其旁以緩其土旱則澆之有草鋤之不厭數多治芋如此其收常倍列仙傳曰酒客為梁使蒸民益種芋三年當大飢卒如其言梁民不死芋可以救飢饉度凶年今中國多不以此為意後生至有耳目所不聞見者及水旱風蟲霜雹之災便致餓死滿道白骨交橫知而不種坐致泯滅悲夫務本新書芋宜沙白地地宜深耕二月種為上時相去六七寸下一芋芋羞三月衆人來往眼目多見并聞刷鍋聲處多不滋息比及炎熱苗高則旺頻鋤其旁秋生子葉以土壅其根芋可以救飢饉蟲蝗不能傷霜後收之冬月食不發病其餘月分不可多食霜後芋子上芋白擘下以滾漿水煠過晒乾冬月炒食味勝蒲笋區芋區長丈餘深闊各一尺區行相間一步寬則透風滋息葵齊民要術葵廣雅曰蘬邱葵也廣志曰胡葵其化紫赤案今世葵有紫莖白莖二種種别復有大小之殊又有鴨腳葵也臨種時必燥曝葵子葵子雖經嵗不浥然濕種者疥而不肥也地不厭良故墟彌善薄即糞之不宜妄種春必畦種水澆春多風旱非畦不得且畦者省地而菜多一畦供一口畦長兩步廣一步大則水難均又不容人足入深掘以熟糞對半和土覆其上令厚一寸鐵齒耙耬之令熟足踏使堅平下水令徹澤水盡下葵子又以熟糞和土覆其上令厚一寸餘葵生三葉然後澆之澆用晨夕日中便止每一掐輒耙耬地令起下水加糞三掐更種一嵗之中凡得三輩凡畦種之物治畦皆如種葵法不復條列繁文早種者必秋耕十月末地將凍散子勞之一畝三升正月末散子亦得人足踏踐之乃佳踏者菜肥地釋即生鋤不厭數五月初更種之春者既老秋葉未生故種此相接六月一日種白莖秋葵白莖者宜乾紫莖者乾則黑而澀秋葵堪食仍留五月種者取子春葵子熟不均故須留中輩於此時附地剪卻春葵冷根上枿音櫱生者柔軟至好仍供常食美于秋菜留之亦中為榜簇掐秋葉必留五六葉不掐則莖孤留葉則科大凡掐葵必待露解諺曰觸露不掐葵日中不剪韭八月半剪去留其岐岐多者則去地一二寸獨莖者亦可去地四五寸枿生肥嫩比至收時高與人膝等莖葉皆美科雖不高菜實倍多其不剪早生者雖高數尺柯葉堅硬全不中食所可用者唯有葉心附葉黃澀至惡煮亦不美看雖似多其實倍少收待霜降傷早黃爛傷晚黑澀榜簇皆須隂中見日亦澀其碎者割訖即地中尋手糾之待萎而糾者必爛崔實曰六月六日可種葵中伏後可種冬葵九月作葵葅乾葵茄子齊民要術種茄子法茄子九月熟時摘取擘破水淘子取沈者速曝乾裹至二月畦種治畦下水一如葵法性宜水常須潤澤著四五葉雨時合泥移栽之若旱無雨澆水令徹澤夜栽之白日以席蓋勿令見日十月種者如區種瓜法推雪著區中則不須栽其春種不作畦直如種凡瓜法者亦得惟須曉夜數澆耳務本新書茄初開花斟酌窠數削去枝葉再長晚茄秋深老茄煮軟水浸去皮以鹽拌勻冬月食用旋添麻油為上蔓菁齊民要術種不求多惟須良地故墟新糞壞牆垣乃佳若無故墟糞者以灰為糞令厚一寸灰多則燥不生也耕地欲熟七月初種之一畝用子三升從處暑至八月白露莭皆得早者作葅晚者作乾漫散而勞種不用濕濕則地堅葉焦既生不鋤九月末收葉晚收則黃落仍留根取子十月中犂粗埒力輟反耕田起土也拾取耕出者若不耕埒則留者英不茂實不繁也其葉作葅擬作乾菜及䖆女亮反葅者䖆葅者次年正月始作耳須留第一好菜擬之割訖則尋手擇治而辮並善切之勿待萎萎而後辮則爛挂著屋下隂中風涼處勿令煙熏煙熏則苦燥則上在厨積置以苫之積時宜候天隂潤不爾多碎折久不苫則澀也春夏畦種供食者與畦葵法同剪訖更種從春至秋得三輩常供好葅取根者用大小麥底六月中種十月將凍耕出之一畝得數車早出者根細又多種蔓菁法近市良田一頃七月初種之六月種者根雖粗大葉復蟲食七月末者葉雖膏潤根復細小七月初種根葉俱得漢桓帝詔曰橫水為災五榖不登令所傷郡國皆種蔓菁以助民食然此可以度凶年救飢饉乾而蒸食既甜且美若值凶年一頃可活百人務本新書耕地宜加糞往復勻蓋秋初可種自破甲至結子皆可食十月初採苗煠作和菜餘者曬過留根在地或慮河朔地寒凍死可于十月終以牛隔兩犁耕一犁拾去菜根之後卻將􅡡土擺勻據先耕出之數曬過冬月蒸食甜而有味春生薹苗亦菜中上品四月收子打油陜西惟食菜油燃燈甚明能變蒜髮比芝麻易種收多油不發風武侯多勸種此菜故川蜀曰諸葛菜油臨時熬用少摻芝麻煉熟即與小油無異蘿蔔胡蘿蔔附齊民要術種菘蘆蔔蒲北反法與蔓菁同菘菜似蔓菁而大方言曰蕪菁紫花者謂之蘆蔔根實粗大其角及根葉並可生食取子者草覆之不則凍死四時類要種蘿蔔宜沙軟地五月犁五六遍六月六日種鋤不厭多稠即小間拔令稀至十月收窖之新添種蘿蔔先深斸成畦杷平每畦可長一丈二尺濶四尺用細熟糞一擔勻布畦內再斸一遍即起覆土再耬平澆水滿畦候水滲盡撒種于上用木杴勻撒覆土苗出兩葉旱則澆之每子一升可種二十畦水蘿蔔正月二月種六十日根葉皆可食夏四月亦可種大蘿蔔初伏種之水蘿蔔末伏種皆候霜降或醃或藏皆得用如要來年出種深窖內埋藏中安透氣草一把至春透芽生取出作壠或畦下糞栽之旱則澆須令得所夏至後收子可為秋種胡蘿蔔伏內畦種或壯地漫種蜀芥藝薹芥子齊民要術蜀芥藝薹取葉者皆七月半種地欲糞熟種法與蕪菁同既生亦不鋤之十月收蕪菁訖時收蜀芥中為鹹淡二葅亦任為乾菜藝薹足霜乃收不足霜即澀種芥子及蜀芥藝薹取子者皆二三月好雨澤時種二物性不耐寒經冬則死故須春種旱則畦種水澆五月熟而收子藝薹冬天草覆亦得取子又得生茹供食務本新書芥子菜宜秋前種大槩雖不及蔓菁餘亦頗同子作芥花芥末如近城郭芥菜宜多種蓋冬月醃藏家家用度曬乾于無煙雨處架起三年亦可食薑齊民要術薑宜白沙地少與糞和熟耕如麻地不厭熟縱橫七遍尤善三月種之先種耬耩尋壟下薑一尺一科令上土厚三寸數鋤之六月作葦屋覆之不耐寒熱故九月掘出置屋中中國多寒宜作窖以榖䅞合埋之䅞奴勒反穀穰中國土不宜薑僅可存活勢不可滋息種者聊擬藥物小小耳崔實曰三月清明節後十日封生薑至四月立夏後蠶大食芽生可種之九月藏茈將几反薑其嵗若溫皆待十月生薑謂之茈薑四時類要種薑濶一步作畦長短任地形橫作壠相去一尺餘五六寸壠中一尺一科帶芽大如三指濶蓋土厚三寸以蠶沙蓋之糞亦得芽出後有草即耘漸漸加土已後壠中卻高壠外即深不得併上土鋤不厭頻菌子四時類要三月種菌子取爛構一名楮木及葉于地埋之常以泔澆令濕三兩日即生又法畦中下爛糞取構木可長六七寸截斷磓碎如種菜法于畦中勻布土蓋水澆長令潤如初有小菌子仰杷推之明旦又出亦推之三度後出者甚大即收食之本自構木食之不損人蒜齊民要術蒜宜良軟地白軟地蒜甜美而科大黑軟次之剛強之地辛辣而瘦小也三遍熟耕九月初種種法黃􅡡時以耬耩逐壠手下之五寸一株諺云左右通鋤一萬餘株空曳勞二月半鋤之令滿三遍勿以無草而不鋤不鋤則科小條拳而軋之不軋則獨科葉黃鋒出則辮於屋下風涼之處桁之早出者皮赤科堅可以遠行晚則皮皴而易碎皴他骨反皮壤也冬寒取榖䅞布地一行蒜一行䅞不爾則凍死收條中子種者一年為獨瓣種二年者則成大蒜科皆如拳又逾于凡蒜矣瓦子壠底置獨瓣蒜于瓦上以土覆之蒜科橫濶而大形狀殊别亦足以為異今并州無大蒜朝歌取種一嵗之後還成百子蒜矣其瓣粗細正與條中子同蕪菁根其大如碗口雖種他州子一年亦變大蒜瓣變小蕪菁根變大二事相反其理難推又八月中方得熟九月中始刈得花子至于五榖蔬果與餘州早晚不殊亦一異也并州踠豆度井陘已東山東榖子入壺關上黨苗而無實皆余目所親見傳信傳疑蓋土地之異者也種澤蒜法預耕地熟時採取子漫散勞之澤蒜可以香食吳人調鼎率多用此根葉作葅更勝蔥韭此物蕃息一種永生蔓延滋曼年年稍廣間區斸取隨手還合但種數畝用之無窮種者地熟美于野生崔實曰布榖鳴收小蒜六月七月可種小蒜八月可種大蒜四時類要種蒜作行下糞水澆之務本新書蒜畦栽每窠先下麥粳少許地宜虛春暖則鋤拔薹時頻澆㔇麥時人多食解暑毒薤薤同齊民要術薤宜白軟良地三轉乃佳二月三月種八月九月種亦得率七八支為一本諺曰蔥三蒜四移蔥者三支為一本種薤者四支為一科然支多者科圓大故以七八為率薤子三月葉青便出之未青而出者肉未滿令薤瘦燥曝挼去莩餘切卻殭根留殭根而濕者即瘦細不得肥也先重耬耩地壠燥培而種之壠燥則薤肥耩重則白長率一尺一本葉生即鋤鋤不厭數薤性多穢荒則羸瘦五月鋒八月初耩不耩則白短葉不用剪剪則損白供常食者别種九月十月出賣經久不佳也擬種子至春地釋即曝之崔實曰正月可種薤韭七月别種薤矣四時類要正月上辛日掃去薤畦中枯葉下水加糞蔥齊民要術收蔥子必薄布隂乾勿令浥鬱蔥性熱不喜浥鬱浥鬱則不生其擬種之地必須春種菉豆五月掩殺之比至七月耕數遍一畝用子四五升良田五升薄地四升炒榖拌和之蔥子性澀不以榖和下不均調不炒榖則草穢生兩耬重耩竅瓠下之以批蒲結反契蘇結反繫腰曳之七月納種至四月始鋤鋤遍仍剪剪與地平高留則無葉深剪則傷根剪欲旦起避熱時良地三剪薄地再剪八月止不剪則不茂剪過則根跳若八月不止則蔥無袍而損白十二月盡掃去枯葉枯袍不去枯葉春葉則不茂二月三月出之良地二月出薄地三月出收子者别留之蔥中亦種胡荽尋手供食乃至孟冬為葅亦不妨四時類要種蔥炒榖攪勻塞耬一眼於一眼中種之他月蔥出取其塞耬一眼之地中土培之疏密恰好乂不勞移韭齊民要術收韭子如蔥子法若市中買韭子宜試之以銅鐺盛水于火上微煮韭子須臾芽生者好芽不生者是浥鬱矣治畦下水糞覆悉與葵同然畦欲極深韭一剪一加糞又根性上跳故須深也二月七月種種法以升盞合地為處布子于圍內韭性內生不向外長圍種令科成薅令常淨韭性多穢數薅為良高數寸剪之初種嵗止一剪至正月掃去畦中陳葉凍解以鐵杷耬起下水加熟糞韭高三寸便剪之剪如蔥法一嵗之中不過五剪每剪杷耬下水加糞悉如初收子者一剪即留之若旱種者但無畦與水耳杷糞悉同一種永生諺曰韭者懶人菜以其不須嵗種也聲類曰韭者久也一種永生崔實曰正月上辛日掃除韭畦中枯葉七月藏韭菁菁韭花也四時類要九月收韭子種韭第一番割棄之主人勿食韭不如栽作行令通鋤割一遍以杷耬之令根不相接為佳如此當葉濶如薤博聞録韭畦若用雞糞尤好胡荽齊民要術胡荽宜黑軟青沙良地三遍熟耕樹隂下得禾豆處亦得春種者用秋耕地開春凍解地起有潤澤時急接澤種之種法近市負郭田一畝用子二升故穊種漸鋤取賣供生菜也外舍無市之處一畝用子一升疏密正好六七月種先燥曬欲種時布子于堅地一升子與一掬濕土和之以腳蹉令破作兩段多種者以磚瓦蹉之亦得以木礱礱之亦得子有兩仁仁仁各著故不破兩段則疏密水裛而不生著土者令注入殼中則生疾而長速種時欲燥此菜非雨不生所以不求濕下也於旦暮潤時以耬耩作壟以手散子即勞令平春雨難期必須藉澤蹉跎失機則不得矣地正月中凍解者時節既早雖浸芽不生但燥種之不須浸子地若二月始解者嵗月稍晚恐澤少不時生失嵗計矣便于暖處籠盛胡荽子一日三度以水沃之二三日則芽生于旦暮時接潤漫擲之數日悉出矣大體與種麻相似假令十日二十日未出者亦勿怪之尋自當出有草乃令拔之菜生二三寸鋤去穊者供食及賣十月足霜乃收之取子者仍留根間古莧反拔令稀穊即不生以草覆上覆者得供生食乂不凍死乂五月子熟拔取曝乾勿使令濕濕則裛鬱格柯打出作蒿篅盛之冬日亦得入窖夏還出之但不濕亦得五六年停一畝收十石都邑糶賣石堪一匹絹若地柔良不須重加耕墾者於子熟時好子稍有零落者然後拔取直深細鋤地一遍勞令平六月連雨時穭音吕生者亦尋滿地省耕種之勞秋種者五月子熟拔去急耕十餘日又一轉入六月又一轉令好調熟如麻地即於六月中旱時耬耩作壟搓子令破手散還勞令平一同春法但既是旱種不須耬潤此菜旱種非連雨不生所以不同春月要求濕下種後未遇連雨雖一月不生亦勿怪麥底地亦得種止須急耕調熟雖名秋種會在六月六月中無不霖遇連雨生則根強科大七月種者雨多亦得雨少則生不盡但根細科小不同六月種者便十倍失矣大都不用觸地濕生高數寸鋤去穊者供食及賣作葅者十月足霜乃收一畝兩載載直絹三匹若留冬食者以草覆之得竟冬食其有春種小小供食者自可畦種畦種者一如葵法挼子沃水生芽種之晝用箔蓋夜則去之晝不蓋熱不生夜不去蟲棲之凡種菜子難生者皆水沃令芽生無不即生矣博聞録胡荽必用月晦日晚下種菠薐一名赤根博聞録菠菜過月朔乃生須二十七八間種之月初即生新添菠薐作畦下種如蘿蔔法春正月二月皆可種逐旋食用食不盡者滾湯內掠熟曬乾遇園枯時溫水浸軟調食甚良秋社後二十日種者可於窨內收藏冬季常食青菜如欲出子十月內種訖至地凍時水淹過來年夏至後收子可為秋種萵苣新添萵苣作畦下種如前法但可生芽先用水浸種一日于濕地上鋪襯置子於上以盆碗合之候芽微出則種春正月二月種之可為常食秋社前一二日種者霜降後可為醃菜如欲出種正月二月種之九十日收同蒿新添同蒿作畦下種亦如前法春二月種可為常食秋社前十日種可為秋菜如欲出種春菜食不盡者可為子人莧新添人莧作畦下種亦如前法但五月種之園枯則食如欲出種留食不盡者八月收子藍菜務本新書二月畦種苗高剝葉食之剝而復生刀割則不長加火煮之以水淘浸或炒爁或拌食或包酸餡或捲餅生食頗有辛味五月園枯此菜獨茂故又曰主園菜食至冬月以草覆其根四月終結子可收作末比芥末根又生葉乂食一年陜西多食此菜若中人之家但能自種三兩畦藍菜并一二畦韭周嵗之中甚省菜錢莙薘新添莙薘作畦下種亦如蘿蔔法春二月種之夏四月移栽園枯則食如欲出子留食不盡者地凍時出於暖處收藏來年春透可栽收種蘭香香菜附齊民要術蘭香羅勒也中國為石勒諱故改今人因以名焉且蘭香之目美于羅勒之名故即而用之三月中候棗葉始生乃種蘭香早種者徒費子耳天寒不生治畦下水一同葵法及水散子訖水盡篩熟糞僅得蓋子便止厚則不生弱苗故也晝日箔蓋夜即去之晝日不用見日夜須受露氣生即去箔常令足水六月連雨拔栽之掐心栽泥中亦活作葅及乾者九月收晚即乾惡作乾者天晴時薄地刈取布地曝之乾乃挼取末甕中盛須則取用拔根懸者裛爛又有雀糞塵土之患取子者十月收自餘雜香菜不列者種法悉與此同博物志曰燒馬蹄羊角成灰春散著濕地羅勒乃生博聞録香菜常以洗魚水澆之則香而茂溝泥水米泔尤佳荏蓼齊民要術荏蓼紫蘇薑芥薰葉與荏同時宜畦種三月可種荏蓼荏子白者良黃者不美荏性甚易生蓼尤宜水畦種也荏則隨宜園畔漫擲便嵗嵗自生矣荏子秋末成可收蓬於醬中藏之蓬荏角也實成則惡其多種者如種榖法雀甚嗜之必須近人家種矣收子壓取油可以煮餅荏油色緑可愛其氣香美煮餅亞胡麻油而勝麻子脂膏麻子脂膏並有腥氣然荏油不可為澤焦人髮研為羮臛美于麻子遠矣又可以為燭良地十石多種博榖則倍收諸田不同為帛煎油彌佳荏油性淳塗帛勝麻油蓼作葅者長二寸則剪絹袋盛沈於醬甕中又長更剪常得嫩者若待秋子成而落莖既堅硬葉又枯燥取子者候實成速收之性易雕零晚則落盡五月六月中蓼可為虀以食莧芹􅛧其吕反苦􅛧江東呼苦蕒齊民要術芹􅛧收根畦種之常令足水尤忌潘普官切淅米汁也泔及鹹水澆之則死性易繁茂而甜脆勝野生者白􅛧尤宜糞嵗嵗可收甘露子務本新書白地內區種暑月以麥粳蓋之承露滋息豆豉四時類要六月造豆豉黑豆不限多少三二斗亦得淨淘宿浸漉出瀝乾蒸之令熟于簟上攤候溫如人體蒿覆一如黃衣法三日一看候黃衣上遍即得又不可太過簸去黃曝乾以水浸拌之不得令太濕又不得令太乾但以手捉之使汁從指間出為候安甕中實築桑葉覆之厚可三寸以物蓋甕口密泥于日中七日開之曝乾又以水拌卻入甕中一如前法六七度候好顔色即蒸過攤卻火氣又入甕中實築之封泥即成矣麩豉四時類要六月造麩䜴麥麩不限多少以水勻拌熟蒸攤候溫如人體蒿艾罨取黃衣遍出攤曬令乾即以水拌令浥浥卻入缸甕中實捺安于庭中倒合在地以灰圍之七日外取出攤曬若顔色未深又拌依前法入甕中色好為度色好後又蒸令熱及熱入甕中築泥卻以冬取喫溫暖勝豆䜴捺乃遏切搦也果實種梨插梨附齊民要術種者梨熟時全埋之經年至春地釋分栽之多著熟糞及水至冬葉落附地刈殺之以炭火燒頭二年即結子若穭生及種而不栽者則著子遲每梨有十許子惟二子生梨餘皆生杜插者彌疾插法用棠杜棠梨大而細理杜次之桑梨大惡棗石榴上插得者為上梨雖治十收得一二也杜如臂已上皆任插常先插杜經年後插之至冬俱下亦得然俱下者杜死則不生也杜樹大者插五枝小者或三或二梨葉微動為上時將欲開莩為下時先作麻紉汝珍反纒十許匝以鋸截杜令去地五六寸不纒恐插時皮披留杜高者梨枝繁茂遇大風則披其高留杜者梨樹早成然宜作蒿簟盛杜以土築之令沒風時以籠盛梨免披耳斜攕所咸反竹為籖刺皮木之際令深一寸許折取其美梨枝陽中者隂中枝則實少長五六寸亦斜攕之令過心大小長短與籖等以刀微􅞑梨枝斜攕之際剝去黑皮勿令傷青皮青皮傷則死拔去竹籖即插梨令至􅞑處木邊向木皮還近皮插訖以綿莫羃同杜頭封熟泥於上以土培覆令梨枝僅得出頭以土壅四畔當梨上沃水水盡以土覆之勿令堅固百不失一梨枝甚脆培土時宜慎之勿使掌撥掌撥則折其十字破杜者十不收一所以然者木裂皮開虛燥故也梨既生杜旁有葉出輒去之不去勢分梨長必遲凡插梨園中者用旁枝庭前者中心旁枝樹下易收中心上聳不妨用根蒂小枝樹形可喜五年方結子鳩腳老枝三年即結子而樹醜吳氏本草曰金創乳婦不可食梨梨多食則損人非補益之物産婦蓐中及疾病未愈食梨多者無不致病咳逆氣上者尤宜慎之凡遠道取梨枝者下根即燒三四寸亦可行數百里猶生藏梨法齊民要術初霜後即收霜多則不得經夏也於屋下掘作深窨坑底無令潤濕收梨置中不須覆蓋便得經夏摘時必令好接勿令損傷凡醋梨易水熱煮則甜美而不損人也案此條首行原本脫去齊民要術書名今校增桃櫻桃蒲萄附齊民要術種法熟時合肉全埋糞地中直置几地則不生生亦不茂桃性早實三嵗便結子故不求栽也至春既生移栽實地若仍處糞中則實小而味苦栽法以鍬合土掘移之桃性易種難栽若離本土率多死故須然矣又種法桃熟時於牆南陽中暖處深寬為坑選取好桃數十枚擘取核即納牛糞中頭向上取好爛糞和土厚覆之令厚尺餘至春桃始動時徐徐撥去糞土皆應生芽合取核種之萬不失一其餘以熟糞糞之則益桃味桃性皮急四年以上宜以刀豎劙其皮不劙者皮急則死七八年便老老則子細十年則死是以宜嵗嵗常種之上人法候其子細便附土斫去枿生者便為少桃如此亦無窮也枿櫱同櫻桃二月初山中取栽陽中者還種陽地隂中者還種隂地若隂陽易地則難生生亦不實此果性生隂地既入園囿便是陽中故多難得生宜堅實之地不可用虛糞也蒲萄蔓延性緣不能自舉作架以承之葉密隂厚可以避熱十月中去根一步許掘作坑收卷蒲萄悉埋之近枝莖薄安黍穰彌佳無穰直安土亦得不宜濕濕則冰凍二月中還出舒而上架性不耐寒不埋則死其嵗久根莖粗大者宜遠根作坑勿令莖折其坑外處亦掘土并穰培覆之博聞録蒲萄宜栽棗樹邊春間鑽棗樹作一竅引蒲萄枝從竅中過蒲萄枝長塞滿竅子斫去蒲萄根托棗根以生其肉實如棗北地皆如此種李齊民要術李性耐久樹得三十年老雖枝枯子亦不細嫁李法正月一日或十五日以磚石著李樹岐中令實繁又法臘月中以杖微打岐間正月晦日復打之亦足子也李樹桃樹並欲鋤去草穢而不用耕墾耕則肥而無實樹下犁撥亦死桃李大率方兩步一根大槩連隂則子細而味亦不佳梅杏齊民要術栽種與桃李同作白梅梅子酸核初成時摘取夜以鹽汁漬之晝則日曝凡作十宿十浸十日便成矣調鼎和虀所在多入也作烏梅亦以梅子核初成時摘取籠盛於突上熏之令乾即成矣烏梅入藥不任調食也作杏李麨法杏李熟時多收取盆中研之生布絞取濃汁塗盤中日曬乾以手磨刮取之可和水為漿及和米麨所在多入也四時類要熟杏和肉埋糞土中至春既生三月移栽實地既移不得更於糞地必致少實而味苦移須含土三步一樹穊即味甘服食之家尤宜種之奈林檎齊民要術奈林檎不種但栽之種之雖生而味不成取栽如壓桑法此果根不浮薉栽故難求是以須壓也又法栽如桃李法林檎樹以正月二月中反斧斑駮椎之則饒子棗㮕棗附齊民要術常選好味者留栽之候棗葉始生而移之棗性硬故生晚栽早者堅垎生遲也三步一樹行欲相當地不耕也欲令牛馬履踐令淨棗性堅強不宜苗稼是以不耕荒穢則蟲生所以須淨地堅饒實故宜踐也正月一日日出時反斧斑駮椎之名曰嫁棗不椎則花而無實斫則子萎而落也候大蠶入簇以杖擊其枝間振去狂花不打花繁實不成全赤即收收法日日撼而落之為上半赤而收者肉未充滿乾則色黃而皮皺將赤味亦不佳全赤不收久則皮破復有烏鳥啄之㮕音軟棗隂地種之陽中則少實足霜色殷然後收之早收者澀不任食也作酸棗麨法多收紅軟者箔上日曝令乾大釡煮之水僅足淹一沸即漉出盆研之生布絞取濃汁塗盤上或盆中盛暑日曝使乾漸以手摩挲取為末以方寸匕投於一碗水中酸甜味足即成好漿遠行用和米麨飢渴得當也栗榛附齊民要術栗種而不栽栽者雖生尋死矣栗初熟時出殼即於屋裏埋著濕土中埋必須深勿令凍徹若路遠者以韋囊盛之停二日已上見風日者則不復生至春二月悉芽生出而種之既生數年不用掌近凡新栽之樹皆不用掌近栗性尤甚也三年內每到十月常須草裹至二月乃解不裹則凍死大戴禮夏小正曰八月栗零而後取之不言剝之榛齊民要術栽種與栗同周官注曰榛似栗而小説文曰榛似梓實如小栗衛詩曰山有蓁詩義疏云蓁栗屬或從木有兩種其一種大小枝葉皆如栗其子形似杼子味亦如栗所謂樹之榛栗者其一種枝莖如木蓼葉如牛李色生高丈餘其核中悉如李作胡桃味膏又美亦可食噉漁陽遼代上黨皆饒其枝莖生樵爇燭明而無煙柿齊民要術柿有小者栽之無者取枝於㮕棗根上插之如插梨法安石榴齊民要術栽石榴法三月初取枝大如手大指者斬令長一尺半八九枝共為一科燒下頭二寸不燒則漏汁矣掘圓坑深一尺七寸口徑尺豎枝於坑畔環圓布枝令勻調也置枯骨礓石於枝間骨石是樹性所宜下土築之一重土一重骨石平坎止其土令沒枝頭一寸許也水澆常令潤澤既生又以骨石布其根下則科圓滋茂可愛若孤根獨立者雖生亦不佳十月中以蒲藁裹而纒之不裹則凍死也二月初乃解放若不能得多枝者取一長條燒頭圓屈如牛拘而橫埋之亦得然不及上法根強早成其拘中亦安骨石其斸根栽者亦圓布之安骨石於其中也木瓜齊民要術木瓜種子及栽皆得壓枝亦生栽種與桃李同務本新書木瓜秋社前後移栽至次年率多結子遠勝春栽銀杏博聞録銀杏有雌雄雄者有三稜雌者有二稜須合種之臨池而種照影亦能結實新添春分前後移栽先掘深坑下水攪成稀泥然後下栽子掘取時連土封用草或麻繩纒束則不致碎破土封橙新添西川唐鄧多有栽種成就懷州亦有舊日橙樹北地不見此種若於附近地面訪學栽植甚得濟用柑與橙同橘新添西川唐鄧多有栽種成就懷州亦有舊日橘樹北地不見此種若於附近地面訪學栽植甚得濟用樝子新添西川唐鄧多有栽種成就北地不見此種若於附近地面訪學栽植甚得濟用諸果齊民要術崔實曰正月自朔暨晦可移諸樹雜木唯有果實者及望而止望謂十五日過十五日則果少實食經云種名果法三月上旬斫取直好枝如大拇指長五尺類要云一尺五寸內著芋頭中種之無芋大蕪菁根亦可類要云蘿蔔亦得勝種核核三四年乃如此大耳可得行種凡五果正月一日雞鳴時把火遍照其下則無蟲災博聞録栁子厚郭槖駝傳所種樹或移徙無不活且碩茂早實以蕃有問之對曰凡植木之性其本欲舒其培欲平其土欲故其築欲密既然已勿動勿慮去不復顧其蒔也若子其置也若棄則其天者全而其性得矣他植者則不然根拳而土易其培之也若不過焉則不及茍有能反是者則又愛之太恩憂之太勤旦視而暮撫已去而復顧甚者爪其膚以驗其生枯搖其本以觀其疏密而木之性日已離矣雖曰愛之其實害之雖曰憂之其實讎之故不我若也凡木皆有雌雄而雄者多不結實可鑿木作方寸穴取雌木填之乃實以銀杏雄樹試之便驗社日以杵舂百果樹下則結實牢不實者亦宜用此法果木有蟲蠧者用杉木作釘塞其穴蟲立死樹木有蟲蠧以芫花納孔中或納百部葉嵗時廣記遁齋間覽凡果木久不實者以祭社餘酒灑之則繁茂倍常用人髮挂枝上則飛鳥不敢近結實時最忌白衣人過其下則其實盡落接諸果四時類要正月取樹本大如斧柯及臂者皆堪接謂之樹砧砧若梢大即去地一尺截之若去地近截之則地力大壯矣夾煞所接之木梢即去地七八寸截之若砧小而高截則地氣難應須以細齒鋸截鋸齒粗即損其砧皮取快刀子於砧緣相對側劈開令深一寸每砧對接兩枝候俱活即待葉生去一枝弱者所接樹選其向陽細嫩枝如筯粗者長四寸許隂枝即少實其枝須兩節兼須是二年枝方可接接時微批一頭入砧處插砧緣劈處令入五分其入須兩邊批所接枝皮處插了令與砧皮齊切令寬急得所寬即陽氣不應急則力大夾煞全在細意酌度插枝了别取本色樹皮一片長尺餘濶三二分纒所接樹枝并砧緣瘡口恐雨水入纒訖即以黃泥泥之其砧面并枝頭并以黃泥封之對插一邊皆同此法泥訖仍以紙裹頭麻纒之恐其泥落故也砧上有葉生即旋去之乃以灰糞擁其砧根外以刺棘遮護勿使有物動撥其枝春雨得所尤易活其實內子相類者林檎梨向木瓜砧上栗子向櫟砧上皆活蓋是類也農桑輯要卷五
