body:
  text: 農桑輯要卷一元司農司撰典訓農功起本周書曰神農之時天雨粟神農遂耕而種之白虎通古之人民皆食禽獸肉至於神農因天之時分地之利制耒耜教民農作神而化之使民宜之故謂之神農典語神農嘗草别榖蒸民乃粒食世本倕作耒耜倕神農之臣也周本紀棄為兒時其遊戲好種樹麻菽及為成人遂好耕農相地之宜宜榖者稼穡焉民皆法則之堯舉為農師漢食貨志后稷始甽田以二耜為耦顔師古曰甽壟也音工犬反或作畎藝文志農九家百一十四篇案原本作百四十一篇今據漢書校改農家者流蓋出農稷之官播百榖勸耕桑以足衣食蠶事起本漢食貨志嘉榖布帛二者生民之本興自神農之世易繫辭神農氏沒黃帝堯舜氏作通其變使民不倦埀衣裳而天下治蓋取諸乾坤孔頴達曰黃帝已上衣鳥獸之皮其後人多獸少事或窮乏故以絲麻布帛而制衣裳使民得宜也通典周制享先蠶先蠶天駟也蠶與馬同氣漢制祭蠶神曰苑窳婦人寓氏公主北齊先蠶祠黃帝軒轅氏如先農禮後周祭先蠶西陵氏經史法言書洪範八政一曰食二曰貨孔頴達曰教民使勤農業求資用也人不食則死食於人最急故教為先有食又須衣故貨為二食則勤農以求之衣則蠶績以求之無逸周公曰嗚呼君子所其無逸先知稼穡之艱難乃逸則知小人之依孔安國曰稼穡農夫之艱難事先知之乃謀逸豫則知小人之所依怙禮記王制國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也三年耕必有一年之食九年耕必有三年之食以三十年之通雖有凶旱水溢民無菜色孝經庶人章用天之道邢昺曰春則耕種夏則藝苗秋則穫刈冬則入廩分地之利邢昺曰分别五土之高下隨所宜而播種之謹身節用以養父母此庶人之孝也史記太史公曰居之一嵗種之以榖十嵗樹之以木百嵗來之以德德者人物之謂也今有無秩祿之奉爵邑之入而樂與之比者命曰素封故曰陸地牧馬二百蹄司馬貞曰馬有四足二百蹄五十匹也牛蹄角千顔師古曰百六十七頭牛為蹄與角凡一千二言千者舉成數也孟康曰馬貴而牛賤以此為率千足羊韋昭曰二百五十頭澤中千足彘水居千石魚陂徐廣曰魚以斤兩為計百二十斤為石顔師古曰大陂養魚一嵗收千石魚山居千章之材服虔曰章方也顔師古曰大材曰章安邑千樹棗燕秦千樹栗蜀漢江陵千樹橘淮北常山巴南河濟之間千樹萩顔師古曰萩即楸字樂彥曰梓木也可以為轅者陳夏千畝漆顔師古曰陳縣夏縣種漆樹而取其汁齊魯千畝桑麻渭川千畝竹及名國萬家之城帶郭千畝畝鍾之田徐廣曰六斛四斗也若千畝巵茜徐廣曰巵音支鮮支也茜音倩一名紅藍其花染繒赤黃也千畦薑韭徐廣曰千畦二十五畝韋昭曰畦猶壟也此其人皆與千户侯等然是富給之資也不窺市井不行異邑坐而待收身有處士之義而取給焉豈非所謂素封者耶案史記作豈所謂素封者耶非也此節取之非原文漢食貨志周制種榖必雜五種以備災害顔師古曰種即五榖謂黍稷麻麥豆也還廬樹桑顔師古曰還繞也菜茹有畦瓜瓠果蓏殖於疆埸雞豚狗彘毋失其時女修蠶織則五十可以衣帛七十可以食肉入者必持薪樵輕重相分班白不提挈冬民既入婦人同巷相從夜績女工一月得四十五日服虔曰一月之中又得夜半為十五日凡四十五日也必相從者所以省費燎火同巧拙而合習俗也顔師古曰燎所以為明火所以為溫燎力召反管子民無所遊食則必農民事農則田墾田墾則粟多粟多則國富齊民要術後魏高陽太守賈思協撰傳曰人生在勤勤則不匱古語曰力能勝貧謹能勝禍蓋言勤力可以不貧謹身可以避禍庸人之性率之則自力縱之則惰窳耳稼穡不修桑果不茂畜産不肥鞭之可也柂落不完垣牆不牢掃除不盡笞之可也此督課之方也且天子親耕皇后親蠶况夫田父而懷惰窳乎先賢務農孟子后稷教民稼穡樹藝五榖五榖熟而民人育汜勝之書泛扶嚴反水名又姓出燉煌濟北二望本姓凡氏避地于汜水因改焉湯有旱災伊尹作為區田教民糞種負水澆稼史記管仲相齊與俗同好惡其稱曰倉廩實而知禮節衣食足而知榮辱猗頓魯窮士聞陶朱公富問術焉告之曰欲速富養五牸乃畜牛羊子息萬計資擬王公案魯窮士以下採貨殖列傳猗頓用盬鹽起注中所引孔叢子語非史記本文莊子長梧封人曰昔豫為禾耕而鹵莽之則其實亦鹵莽而報豫藝而滅裂之則其實亦滅裂而報豫豫來年變齊注變更也變更所法也齊同也深其耕而熟耰之其禾繁以滋豫終年厭飱漢食貨志李悝為魏文侯作盡地力之教顔師古曰李悝文侯臣也悝音恢以為地方百里提封九萬頃除山澤邑居參分去一為田六百萬畝治田勤謹則畝益三升服虔曰與之三升也臣瓚曰當言三斗謂治田勤則畝加三斗也師古曰計數而言字當為斗瓚説是也不勤則損亦如之地方百里之增減輒為粟百八十萬石矣又曰糴甚貴傷民韋昭曰此民謂士工商也甚賤傷農民傷則離散農傷則國貧故甚貴與甚賤其傷一也漢文帝時賈誼説上曰管子曰倉廩實而知禮節民不足而可治者自古及今未之嘗聞漢之為漢幾四十年矣公私之積猶可哀痛世之有飢穰天之行也禹湯被之矣即不幸有方二三千里之旱國胡以相恤卒然邊境有急數十百萬之衆國胡以餽之夫積貯者天下之大命也茍粟多而財有餘何為而不成以攻則取以守則固以戰則勝懷敵附遠何招而不至今驅民而歸之農使天下各食其力末技遊食之人轉而緣南畝則蓄積足而人樂其所矣前漢宣曲任氏之先為督道倉吏秦之敗也豪傑皆爭取金玉而任氏獨窖倉粟楚漢相距滎陽也民不得耕種米石至萬而豪傑金玊盡歸任氏任氏以此起富富人爭奢侈而任氏折節為儉力田畜人爭取賤賈任氏獨取貴善富者數世然任公家約非田畜所生不衣食公事不畢則身不得飲酒食肉以此為閭里率故富而主上重之案此採史記貨殖傳與漢書字句稍異黃霸為潁川太守使郵亭鄉官皆畜雞豚以贍鰥寡貧窮者為條教班行之于民間勸以為善防姦之意及務耕桑節用殖財種樹畜養去食榖馬米鹽靡密顔師古曰雜而且細初若煩碎然霸精力能推行之治為天下第一龔遂為渤海太守躬率以儉約勸民務農桑令日種一樹榆百本薤五十本蔥一畦韭家二母彘五雞民有帶持刀劒者使賣劒買牛賣刀買犢曰何為帶牛佩犢春夏不得不趣田畝秋冬課收斂益畜果實菱芡吏民皆富實何武為揚州刺史行部必問墾田頃畝五榖美惡召信臣為南陽太守好為民興利務在富之躬勸耕農出入阡陌止舍離鄉亭稀有安居時行視郡中水泉開通溝瀆起水門提閼凡數十處以廣溉灌嵗嵗增加多至三萬頃民得其利蓄積有餘信臣為民作均水約束刻石立於田畔以防分爭禁止嫁娶送終奢靡務出於儉約郡中莫不耕稼力田吏民親愛信臣號曰召父後漢王丹家纍千金好施與周人之急每嵗時農收後察其強力收多者輒歷載酒肴從而勞之便於田頭樹下飲食勸勉之因留其餘有而去其惰懶者獨不見勞各自恥不能致丹其後無不力田者聚落以致殷富杜詩為南陽太守省愛民役廣拓土田郡內比室殷足為之語曰前有召父後有杜母任延為九真太守俗以射獵為業不知牛耕每致困乏延乃令鑄作田器教之墾闢嵗嵗開廣百姓充給茨充為桂陽令俗不種桑無蠶織絲麻之利類皆以麻枲頭貯衣民惰窳少粗履足多剖裂血出盛冬皆然火燎炙充教民益種桑柘養蠶織履復令種苧麻數年之間大賴其利衣履溫暖今江南知桑蠶織履皆充之教也張堪拜漁陽太守開稻田八千餘頃勸民耕種以教殷富百姓歌曰桑無附枝麥穗兩岐張君為政樂不可支樊重字君雲後漢書樊宏傳宏世祖之舅封壽張侯父重追爵諡為壽張敬侯世善農稼好貨殖重性溫厚有法度三世共財子孫朝夕禮敬常若公家其營理産業物無所棄課役童隸各得其宜故能上下勠力財利嵗倍至乃開廣田土三百餘頃其所起廬舍皆有重堂高閣陂渠灌注又池魚牧畜有求必給嘗欲作器物先種梓漆時人嗤之然積以嵗月皆得其用向之笑者咸求假焉資至巨萬而賑贍宗族恩加鄉閭外孫何氏兄弟爭財重恥之以田二頃解其忿訟縣中稱美其素所假貸人間數百萬遺令焚削文契責家聞者皆慚爭往償之常戒其子曰案後漢書本句上有宏為人謙柔畏慎不求茍進二句是君雲之子宏戒其子之言此作君雲戒其子有脫誤富貴盈溢未有能終者吾非不喜榮勢也天道惡滿而好謙前世貴戚皆明戒也保身全己豈不樂哉王景為廬江太守百姓不知牛耕致地力有餘而食常不足景乃教用犁耕墾闢倍多境內豐給又訓令蠶織為作法制著於鄉亭王符曰一夫不耕天下受其飢一婦不織天下受其寒今舉俗舍本農趨商賈牛馬車輿填塞道路遊手為巧充盈都邑是則一夫耕百人食之一婦桑百人衣之以一奉百孰能供之崔實為五原太守土宜麻枲而俗不知織績民冬月無衣積細草而臥其中見吏則衣草而出實為作紡績織絍具以教之民得以免寒苦劉陶曰民可百年無貨不可一朝有飢故食為至急也仇覽為蒲亭長勸人生業為制科令至於果菜為限雞豕有數農事既畢乃令子弟羣居就學其剽輕遊恣者皆役以田桑嚴設科罰躬助喪事賑恤窮寡期年稱大化杜畿為河東勸耕桑課民畜牸牛草馬下逮雞豚皆有章程家家豐實然後興學校舉孝悌河東遂安童恢除不其令若吏稱其職人行善事皆賜酒肴以勸勵之耕織種收皆有條章一境清淨齊民要術皇甫隆為燉煌令燉煌俗不曉作耬犁及種人牛功力既費而收榖更少隆乃教作耬犁所省傭力過半得榖加五又燉煌俗婦女作裙攣縮如羊腸用布一匹隆又禁改之所省復不資僮种為不其令率民養一豬雌雞四頭以供祭祀死買棺木案僮种即童恢見後漢書注前吏稱其職一條採之本傳此條採之齊民要術序以一人而兩載其事顔裴為京兆乃令整阡陌樹桑果又課以間月取材使得轉相教匠作車又課民無牛者令畜豬投貴時賣以買牛始者民以為煩一二年間家有丁車大牛整頓豐足譙子曰朝發而夕異宿勤則菜盈傾筐且茍無羽毛不織不衣不能茹草飲水不耕不食安可以不自力哉李衡於武陵龍陽洲上作宅種甘橘千樹敕兒曰吾州里有千頭木奴不責汝衣食嵗上一匹絹亦可足用矣橘成嵗得絹數千匹仲長子曰天為之時而我不農榖亦不可得而取之青春至焉時雨降焉始之耕田終之簠簋惰者釡之勤者鍾之時及不為而尚得食也哉魏陳思王曰寒者不貪尺玉而思短褐飢者不願千金而美一食晉桓宣鎮襄陽勸課農桑或載鋤耒於軺軒或親耘穫於隴畝北魏辛纂拜河南刺史督勸農桑親自檢視勤者資以物帛惰者加以罪唐張全義為河南尹經黃巢之亂繼以秦宗權孫儒殘暴居民不滿百户四野俱無耕者全義招懷流散勸之樹藝數年之後都成坊曲漸復舊制諸縣户口率皆歸復桑麻蔚然野無曠土全義明察人不能欺而為政寬簡出見田疇美者輒下馬與僚佐共觀之召田主勞以酒食有蠶麥善收者或親至其家悉呼出老幼賜以茶綵衣物民間言張公不喜聲伎見之未嘗笑獨見佳麥良繭則笑耳有田荒穢者則集衆杖之或訴以乏人牛乃召其鄰里責之曰彼誠乏人牛何不助之衆皆謝乃釋之由是鄰里有無相助故比户皆有畜積凶年不飢遂成富庶焉李襲譽嘗謂子孫曰吾負京有田十頃能耕之足以食河內千樹桑事之可以衣能勤此無資於人矣耕墾耕地齊民要術春耕尋手勞郎到反古曰擾今曰勞説文曰擾摩田器今人亦名勞曰摩秋耕待白背勞秋既多風若不尋勞地必虛燥秋田㙷實濕勞令地硬諺曰耕而不勞不如作暴蓋言澤難遇喜天時故也桓寬鹽鐵論曰茂木之下無豐草大塊之間無美苗㙷直輒反田實也暴音曝耗也凡秋耕欲深春夏欲淺犂欲亷勞欲再犂亷耕細牛復不疲再勞地熟旱亦保澤也秋耕㽢掩同青者為上比至冬月青草復生者其美與小豆同初耕欲深轉地欲淺耕不深地不熟轉不淺動生土也菅茅之地宜縱牛羊踐之踐則根浮七月耕之則死非七月復生矣凡美田之法菉豆為上小豆胡麻次之悉皆五六月中䆊羮懿反漫種也種七月八月犂㽢殺之為春榖田則畝收十石一石大約今二斗七升十石今二石七斗有餘也後齊民要術中石斗倣此其美與蠶矢熟糞同汜勝之書曰凡耕之本在於趨時和土務糞澤早鋤早穫春凍解地氣始通土一和解夏至天氣始暑隂氣始盛土復解夏至後九日案汜勝之書作夏至後九十日晝夜分天地氣和以此時耕田一而當五名曰膏澤皆得時功春地氣通可耕堅硬強地黑壚土輒平摩其塊以生草草生復耕之天有小雨復耕和之勿令有塊以待時所謂強土而弱之春候地氣始通土塊散陳根可拔此時二十日以後和氣去即土剛以此時耕一而當四和氣去耕四不當一杏始華榮輒耕輕土弱土望杏花落復耕耕輒勞之草生有雨澤耕重勞之土甚輕者以牛羊踐之如此則土強此謂弱土而強之也雜説凡人家營田須量己力寧可少好不可多惡凡地有薄者即須加糞糞之其踏糞法秋收治田後場上所有榖穰等並須收貯一處每日布牛腳下三寸厚古一尺大約今一尺三寸有餘後齊民要術尺寸倣此每平旦收聚堆積之還依前布之經宿即堆聚至十二月正月之間即載糞糞地案齊民要術有雜説四條此節採第一條之説種蒔直説古農法犁一擺六今人只知犁深為功不知擺細為全功擺功不到土粗不實下種後雖見苗立根在粗土根土不相著不耐旱有懸死蟲咬乾死等諸病擺功到土細又實立根在細實土中又碾過根土相著自耐旱不生諸病韓氏直説為農大綱一則牛欺地二則人欺苗牛欺地則所種不失其時人欺苗則省力易辦反是則徒勞無益矣凡地除種麥外並宜秋耕先以鐵齒擺縱橫擺之然後插犂細耕隨耕隨撈至地大白背時更擺兩遍至來春地氣透時待日高復擺四五遍其地爽潤上有油土四指許春雖無雨時至便可下種秋耕之地荒草自少極省鋤工如牛力不及不能盡秋耕者除種粟地外其餘黍豆等地春耕亦可大抵秋耕宜早春耕宜遲秋耕宜早者乘天氣未寒將陽和之氣掩在地中其苗易榮過秋天氣寒冷有霜時必待日高方可耕地恐掩寒氣在內令地薄不收子粒春耕宜遲者亦待春氣和暖日高時依前耕擺代田漢食貨志趙過為搜粟都尉過能為代田一畝三甽嵗代處故曰代田師古曰代易也古法也后稷始甽田以二耜為耦廣尺深尺曰甽長終畝一畝三甽一夫三百甽而播種於甽中師古曰種謂榖子也苗生葉以上稍耨壠草師古曰耨鋤也因隤其土以附苗根師古曰隤謂下之也音穨比盛暑壠盡而根深能風與旱師古曰能讀曰耐其耕耘下種田器皆有便巧率十二夫為田一井一屋故畝五頃鄧展曰九夫為井三夫為屋夫百晦於古為十二頃古百步為晦漢時二百四十步為畝古千二百畝則得今五頃用耦犂二牛三人一嵗之收常過縵田畝一斛以上師古曰縵田謂不為甽者也縵莫幹反善者倍之師古曰善為甽者又過縵田二斛已上也過使教田太常三輔蘇林曰太常主諸陵有民故亦課田種大農置工巧奴與從事為作田器二千石遣令長三老力田及里父老善田者受田器學耕種養苗狀蘇林曰為法意狀也民或苦少牛亡以趨澤師古曰趨讀曰趣趣及也澤雨之潤澤也故平都令光教過以人挽犂師古曰挽引也音晚過奏光以為丞教民相與庸挽犂師古曰庸功也言換功共作也義亦與庸賃同率多人者田日三十畝少者十三畝以故田多墾闢是後民皆便代田用力少而得榖多崔實曰趙過教民耕殖其法三犂共一牛一人將之下種挽耬皆取備焉日種一頃據齊地大畝一頃為三十五畝也至今三輔猶賴其利今遼東耕犂轅長四尺回轉相妨既用兩牛兩人牽之一人將耕一人下種二人挽耬凡用兩牛六人一日才種二十五畝其懸絶如此三犂共一牛若今三腳耬矣今自濟州已西猶用長轅犂兩腳耬長轅耕平地尚可於山澗之間則不任用且回轉至難費力未如齊人蔚犂之柔便也兩腳耬種壠穊亦不如一腳耬之得中也區田齊民要術泛勝之書區種法曰湯有旱災伊尹作為區田教民糞種負水澆稼區田以糞氣為美非必須良田也諸山陵近邑高危傾阪及丘城上皆可為區田區田不耕旁地庶盡地力務本新書夫豐儉不常者天之道也故君子貴於思患而豫防之湯有七年之旱伊尹製此法大概與今時種瓜相類區當於間時旋旋掘下正月種春大麥二三月種山藥芋子三四五月種榖大小豇菉豆八月種二麥豌豆節次為之亦不可貪多榖豆二麥各料百餘區山藥芋子各一十區通約收四五十石數口之家可以無飢矣壬辰戊戌之際但能區種三五畝者皆免飢殍農桑輯要卷一
