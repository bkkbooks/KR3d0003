body:
  text: 農桑輯要卷七元司農司撰孶畜禽魚及嵗用雜事附養馬牛總論齊民要術服牛乘馬量其力能寒溫飲飼適其天性如不肥充蕃息者未之有也諺曰羸牛劣馬寒食下言其乏食瘦瘠春中必死務在充飽調適而已四時類要三月收合龍駒合驢馬之牝牡此月三日為上月令季春之月乃合纍牛騰馬案月令合纍牛騰馬注纍騰皆乘匹之名此作騾牛驢馬今校改遊牝於牧仲夏之月遊牝别羣則縶騰駒馬驢騾附齊民要術飲飼之節食有三芻飲有三時何謂也一曰惡芻二曰中芻三曰善芻謂飢時與惡芻飽時與善芻引之令食食常飽則無不肥銼草粗雖足豆榖亦不肥充細銼無莭篩去土而食之者令馬肥不啌如此喂飼自然好也啌苦江反何謂三時一曰朝飲少之二曰晝飲則胸饜水三曰暮極飲之一曰夏汗冬寒皆當莭飲諺曰旦起騎榖日中騎水斯言旦飲須莭水也每飲食勿行驟則消水小驟數百步亦佳十日一放令其陸梁舒展令馬硬實也驢騾大槩類馬不復别起條端凡驢馬駒初生忌灰氣遇新出爐者輒死經雨即不死凡以豬槽餵馬以石灰泥馬槽汗繫著門皆令馬落駒術曰常繫獮猴於馬房令馬不畏辟惡消百病也馬久步即生筋勞筋勞則生蹄痛久立則發骨勞骨勞則發癰腫久汗不乾則生皮勞皮勞者𩥇而不振汗未燥而飲飼之則生氣勞氣勞者𩥇而不噴馳驅無節則生血勞血勞則發強行何以察五勞終日馳驅舍而視之不𩥇者筋勞也𩥇而不時起者骨勞也起而不振者皮勞也振而不噴者氣勞也噴而不溺者血勞也筋勞者兩絆卻行三十步而已骨勞者令人牽之起從後笞之起而已皮勞者夾脊摩之熱而已氣勞者緩繫之櫪下逺餧草噴而已血勞者髙繫無飲食之大溺而已治牛馬疫氣方取獺屎煮灌之獺肉及肝彌良不能得肉肝乃用屎耳治馬喉腫方以物纒刀子露刃鋒一寸許刺咽喉潰則愈治馬黑汗方取乾馬糞置瓶子中頭髮覆之火燒馬糞及髮煙出著馬鼻熏令煙入鼻中須臾即差又方豬脊引脂雄黃亂髮燒煙熏鼻同上法案此二條並治馬黑汗方原夲俱作治馬喉腫又方今據齊民要術校改又療馬結熱起卧戰不食水草方黃連二兩杵末白鮮皮一兩杵皮油五合豬脂四兩細切右以溫水一升半和藥調停灌下牽行拋糞即愈馬疥方臰音臭黃案齊民要術作雄黃頭髮臘月豬脂煎令髮消及熱塗立效馬傷水用蔥鹽油相和搓成團子納鼻中以手掩馬鼻令不通氣良久待眼淚出即止馬傷料用生蘿蔔三五箇切作片子啖之立效馬猝熱腹脹起卧欲死方藍汁二升和冷水二升灌之立效治新生小駒子瀉肚方藁夲末三錢用大麻子研汁調灌下咽喉便效次以黃連末大麻汁解之驢馬磨打破瘡馬齒菜石灰一處搗為團曬乾後再搗羅為末先口含鹽漿水洗淨用藥末貼之驗常啖馬藥鬱金大黃甘草山梔子貝母白藥子黃藥子黃芩款冬花秦艽黃檗黃連知母桔梗藁本右件一十五味各等分同搗羅為末每一匹馬啖藥末二兩許仍用油蜜豬脂雞子飯食少許同和調啖之啖後不得飲水至夜喂飼馬氣藥方青橘皮當歸桂心大黃芍藥木通郁李仁瞿麥白芷牽牛子右件十味各等分搗羅為末用溫酒調灌每匹馬藥末半兩許點馬眼藥青鹽黃連馬牙硝㽔仁右件四味各等分同研為末用蜜煎入瓷瓶子盛或點時旋取少許以井水浸化點治馬急起卧取壁上多年石灰細杵羅用酒調二兩已來灌之立效治馬食槽內草結方好白礬末一兩分為二服每貼和飲水後啖之不過三兩度即內消卻此法神驗博聞録馬傷脾方川厚朴去粗皮為末同薑棗煎灌應脾胃有傷不食水草褰唇似笑鼻中氣短宜速與此藥馬心熱方甘草芒硝黃檗大黃山梔子瓜蔞為末水調灌應心肺壅熱口鼻流血跳躑煩燥宜急與此藥馬肺毒方天門冬知母貝母紫蘇芒硝黃芩甘草薄荷葉同為未飯湯入少許醋調灌療肺毒熱極鼻中噴水馬肝壅方朴硝黃連為末男子頭髮燒灰存性漿水調灌應邪氣衝肝眼目似睡忽然眩倒此方主之馬腎搐方烏藥芍藥當歸玄參山茵蔯白芷山藥杏仁秦艽每服一兩酒一大升同煎溫灌隔日再灌馬氣喘方玄參葶藶升麻牛黃兜苓黃耆知母貝母同為末每服二兩漿水調草後灌之應喘嗽皆治馬尿血方黃耆烏藥芍藥山茵蔯地黃兜苓枇杷葉為末漿水煎沸候冷調灌應六月熱尿血皆主療之馬喉腫方螺青川芎知母川鬱金牛蒡炒薄荷貝母同為末每服二兩蜜二兩漿水煎沸候溫調灌馬結尿方滑石朴硝木通車前子同為末每服一兩溫水調灌隔時再服結甚則加山梔子赤芍藥同末馬結糞方皂角燒灰存性同大黃枳殼麻子仁黃連厚朴為末清米泔調灌若傷突加蔓荆子末同調馬舌硬方款冬花瞿麥山梔子地仙草青黛硼砂朴硝油煙墨等分為細末每用半兩許塗舌上立差馬膈痛方羌活白藥甜瓜子當歸沒藥芍藥為末春夏漿水加蜜秋冬小便調療膈痛低頭難不食草馬流沫方當歸菖蒲白术澤瀉赤石脂枳殼厚朴甘草為末每一兩半酒一升蔥白三握同水煎溫灌馬傷蹄方大黃五靈脂木鱉子去油海桐皮甘草土黃藝薹子白芥子為末黃米粥調藥攤帛上裹之牛水牛附四時類要治牛疫方取人參一兩細切水煮汁五升灌口中差又方真安息香於牛欄中燒如燒香法如初覺有一頭至兩頭是疫即牽出以鼻吸之立愈又方十二月頭燒作灰和水五升灌口中良牛腹脹欲死方研麻子汁五升溫令熱灌口中愈此治食生豆腹脹垂死者甚良牛鼻脹方以醋灌耳中立差牛疥方煮黑豆汁熱洗五度差一夲作烏頭汁牛肚脹及嗽方取榆白皮水煮令熟甚滑以三五升灌之即差牛虱方以胡麻油塗之即愈豬脂亦得六畜虱塗之亦愈博聞録牛瘴疫方用真茶二兩和水五升灌之又治牛猝疫而動頭打脅急用巴豆七個去殼細研出油和灌之即愈又燒蒼术令牛鼻吸其香止牛尿血方川當歸紅花為細末以酒二升半煎取二升冷灌之又法豉汁調食鹽灌牛患白膜遮眼用炒鹽并竹節燒存性細研一錢貼膜效牛氣噎方牛有茅根噎以皂角末吹鼻中更以鞋底拍尾停骨下效牛腹脹方牛喫著雜蟲即腹脹用燕屎一合漿水二升調灌之效牛觸人方牛顛走逢人即觸是膽大也黃連大黃末雞子酒調灌之牛尾焦不食水草以大黃黃連白芷末雞子酒調灌之牛氣脹方淨水洗汗襪取汁一升好醋半升許灌之愈牛肩爛方舊綿絮三兩燒存性麻油調抹忌水五日愈牛漏蹄方紫礦為末豬脂和納蹄中燒鐵箆烙之愈牛沙疥方蕎麥隨多寡燒灰淋汁入緑礬二合和塗愈韓氏直説餵養牛法農隙時入暖屋用場上諸粳穰鋪牛腳下謂之牛鋪牛糞其上次日又覆粳穰每日一覆十日除一次牛一具三隻每日前後餉約飼草三束豆料八升或用蠶沙乾桑葉水三桶浸之牛下餉噍透刷刨飲畢辰巳時間上槽一頓可分三和皆水拌第一和草多料少第二比前草減半少加料第三草比第二又減半所有料全繳拌食盡即往使耕噍了牛無力夜餵牛各帶一鈴草盡牛不食則鈴無聲即拌之飽使耕俗諺云三和一繳須管要飽不要噍了使去最好水牛飲飼與黃牛同夏須得水池冬須得暖厰牛衣羊齊民要術常留臘月正月生羔為種者上十一月二月生者次之非此月數生者毛必焦卷骨骼細小所以然者逄寒遇熱故也其八九十月生者雖值秋肥然比之冬暮母乳已竭春草未生是故不佳其三四月生者草雖茂美而羔小未食常飲熱乳所以亦惡五六七月生者兩熱相仍中之甚惡其十一月十二月生者母既多乳膚軀充滿草雖枯亦不羸瘦母乳適盡即得春草是以極佳大率十口一羝羝少則不孕羝多則亂羣不孕者必瘦瘦則匪惟不蕃息經冬或死羝無角者更佳有角者喜相抵觸傷胎所由也擬供厨者宜剩之剩法生十餘日布裹齒碎之牧羊必須老人心性宛順者起居以時調其宜適卜式云牧民何異於是者若使急性人及小兒者攔約不得必有打傷之災或遊戲不看則有狼犬之害懶不驅行無肥充之理將息失所有羔死之患也惟逺水為良傷水則蹄甲膿出二日一飲頻飲則傷水而鼻膿緩驅行勿停息息則不食而羊瘦急行則坌塵而蚛顙也春夏早放秋冬晚出春夏氣和所以宜早秋冬霜露所以宜晚養生經云春夏早起與雞俱興秋冬晏起必待日光此其義也夏日盛暑須得隂涼若日中不避熱則塵汗相染秋冬之間必致癬疥七月已後霜露氣降必須日出霜露晞解然後放之不爾則逢毒氣令羊口瘡腹脹也圈不厭近必須與人居相連開窗向圈所以然者羊性怯弱不能禦物狼一入圈或能絶羣架北牆為廠為屋則傷熱熱則塵疥癬且屋處慣暖冬月入田尤不耐寒圈中作臺開竇無令停水二日一除毋使糞穢穢則汚毛停水則夾蹄眠濕則腹脹也圈內須並牆豎柴柵令周匝羊不揩土毛常自淨不豎柴者羊揩牆壁土鹹相得毛皆成氈又豎柵頭出牆者虎狼不敢踰羊一千口者三四月中種大豆一頃雜穀并草留之不須鋤治八九月中刈作青茭若不種豆穀者初草實成時收刈雜草薄鋪使乾勿令鬱浥䝁豆胡豆蓬藜荆棘為上大小豆萁次之髙麗豆萁尤是所便蘆薍二種則不中凡乘秋刈草非直為羊而然大凡悉皆倍勝崔實曰七月七日刈芻茭也既至冬寒多饒風霜或春初雨落青草未生時則須飼不宜出放羊有疥者間别之不别相染汙或能合羣致死羊疥先著口者難治多死凡羊經疥得差後夏初肥時宜賣易之不爾後春疥發必死矣家政法曰養羊法當以瓦器盛一升鹽懸羊欄中羊喜鹽自數還啖之不勞人牧羊有病輒相汙欲令别病法當欄前掘瀆深二尺廣四尺往還皆跳過者無病不能過者入瀆中行過便别之龍魚河圖曰羊有一角食之傷人案此條上原夲脫去龍魚河圖曰五字今校增四時類要羊疥皮梨蘆根敲打令皮破以泔浸之瓶盛塞口放竈邉令常暖數日味酸便中用以甎瓦刮疥處令赤若堅硬者湯洗之去痂拭令乾以藥汁塗之再上愈疥若多逐日漸漸塗之勿頓塗恐不勝痛也又方豬脂和臰黃塗之愈羊中水方羊膿鼻眼不淨者皆以水洗治之其方以湯和鹽杓中研令極鹹候冷取清者以小角子受一雞子者灌兩鼻各一角五日後以眼鼻淨為候不差更灌羊膿鼻方羊膿鼻及口頰生瘡如乾癬者相染多致絶羣治法豎長竿圈中竿頭置板令獼猴居上辟狐狸而益羊差病也羊夾蹄方取羝羊脂和鹽煎令熟燒鐵令微熱勻脂烙之勿令入泥水不日自差剪羊毛三月候毛牀動則剪剪訖以河水洗即生毛潔白八月候胡葈子未成時剪之不爾則損毛中旬後剪則勿洗恐寒氣損羊豬齊民要術母豬取短喙無柔毛者喙長則牙多一廂三牙已上則不煩畜為難肥故有柔毛者焰治難淨也牝者子母不同圈子母同圈喜相聚不食則死傷牡者同圈則無嫌牡性遊蕩若非家生則易走失圈不厭小圈小則肥疾處不厭穢泥汁則避暑亦須小厰以避雨雪春夏草生隨時放牧糟粳之屬當日别與糟粳經夏輒敗不中停放八九十月放而不飼所有糟粳則畜待窮冬春初豬性甚便水生之草杷耬水藻等令近岸豬則食之皆肥初産者宜煮穀飼之其子三日便掐尾六十日後犍三日掐尾則不畏風凡犍豬死者皆風所致耳犍不截尾則前大後小犍骨細肉多不犍則骨粗肉少如犍牛法者無風死之患十一月十二月生者豚一宿蒸之蒸法索籠盛豚著甑中微火蒸之汗出便罷不蒸則腦凍不合不出旬便死所以然者豚性腦少寒盛則不能自暖故須暖氣助之供食豚乳下者佳簡取别飼之愁其不肥共母同圈粟豆難足宜埋車輪為食場散粟豆於內小豚食足出入自由則肥速四時類要閹豬子待瘡口乾平復後取巴豆兩粒去殼爛搗和麻籸糟粳之類飼之半日後當大瀉其後日見肥大肥豕法麻子二升搗十餘杵鹽一升同煮後和粳三斗飼之立肥養雞齊民要術雞種取桑落時生者良形小淺毛腳細短者是也守窠少聲善育雛子春夏生者則不佳形大毛羽悅澤腳粗長者是遊蕩饒聲産乳易厭既不守窠則無緣蕃息也雞春夏雛二十日內無令出窠飼以燥飯出窠早不免烏鴟與濕飯則令臍膿也雞棲宜據地為籠籠內著棧雖鳴聲不朗而安穩易肥又免狐狸之患若任之樹木一遇風寒大者損瘦小者或死燃栁柴殺雞雛小者死大者盲此亦燒黍穰殺瓠之流其理難悉家政法曰養雞法二月先耕一畝作田秫粥灑之刈生茅覆上自生白蟲便買黃雌雞十隻雄一隻於地上作屋方廣丈五於屋下懸簀令雞宿上夏月盛晝雞當還屋下息并於園中築作小屋覆雞得養子烏不得就養雞令速肥不爬屋不暴園不畏烏鴟狐狸法别築牆匡開小門作小厰令雞以避雨日雌雄皆斬去六翮無令得飛出常多收秕稗胡豆之類以養之亦作小槽以貯水荆藩為棲去地一尺數掃去屎鑿牆為窠亦去地一尺惟冬天著草不則子凍春夏秋三時則不須直置匡上任其産伏留草則蛆蟲生雛出則著外以罩籠之如鵪鶉大還牆內匡中其供食者又作牆匡蒸小麥飼之三七日便肥大矣又穀産雞子供常食法别取雌雞無令與雄相雜其牆匡斬翅荆棲土窠一如前惟多與穀令竟冬肥盛自然穀産矣一雞生百餘卵不雛並食之無咎龍魚河圖曰黑雞白頭食之病人有六指者殺人養生論曰雞肉不可令小兒食食之生蛔蟲又令體消瘦鵝鴨齊民要術鵝鴨並一嵗再伏者為種一伏得子者少三伏者冬寒雛多死也大率鵝三雌一雄鴨五雌一雄鵝初輩生子十餘鴨生數十後輩皆漸少矣常足五穀飼之生子多不足者生子少欲於厰屋之下作窠以防豬犬狐狸驚恐之患多著細草於窠中令暖先刻白木為卵形窠别著一枚以誑之不爾不肯入窠喜束西浪生若獨著一窠後有爭窠之患生時尋即收取别著一暖處以柔細草覆藉之停置窠中凍即雛死伏時大鵝一十子大鴨二十子小者減之多則不周數起者不任為種數起則凍冷也其貪伏不起者須五六日一與食起之令洗浴久不起者飢羸身冷雖伏無熱鵝鴨皆一月雛出量雛欲出之時四五日內不用聞打鼓紡車大呌豬犬及舂聲又不用器淋灰不用見新産婦觸忌者雛多厭殺不能自出假今出亦尋死也雛既出作籠籠之先以粳米為粥縻一頓飽食之名曰填嗉然後以粟飯切苦菜蕪菁英為食以清水與之濁則易不易泥塞鼻則死入水中不用停久尋宜驅出此既水禽不得水即死臍未合久則水中冷徹亦死於籠中高處敷細草令寢處其上雛小臍未合不欲冷也十五日後乃出籠早放者匪直乏力致困又有寒冷兼烏鴟災也鵝惟食五穀稗子及草萊不食生蟲葛洪方曰居射工之地當養鵝鵝見此物能食之故鵝辟此物也鴨靡不食矣水稗實成時尤是所便噉此足得肥充供厨者子鵝百日以外子鴨六七十日佳過此肉硬大率鵝鴨六年以上老不復生伏矣宜去之少者初生伏又未能工惟數年之中佳耳純取雌鴨無令雜雄足其粟豆常令肥飽一鴨便生百卵俗所謂殺生者此卵既非隂陽合生雖伏亦不成雛宜以供膳幸無麛卵之咎也魚齊民要術陶朱公養魚經曰夫治生之法有五水畜第一水畜所謂魚池也以六畝地為池池中作九洲求懷子鯉魚長三尺者二十頭牡鯉魚長三尺者四頭以二月上庚日納池中令水無聲魚必生至四月內一神守六月內二神守八月內三神守神守者鱉也所以納鱉者魚滿三百六十則蛟龍為之長而將魚飛去納鱉則魚不復去在池中周繞九洲無窮自謂江湖也至來年二月得鯉魚長一尺者一萬五千枚三尺者四萬五千枚二尺者萬枚至明年得長一尺者十萬枚長二尺者五萬枚長三尺者五萬枚長四尺者四萬枚留長二尺者千枚作種所餘皆貨候至明年不可勝計也池中有九洲八谷谷上立水二尺又谷中立水六尺所以養鯉者鯉不相食易長又貴也又作魚池法三尺大鯉非近江湖倉卒難求若養小魚積年不大欲令生大魚法須載取藪澤陂湖饒大魚之處近水際土十數載以布池底二年之內即生大魚蓋由土中先有大魚子得水即生也蜜蜂新添人家多於山野古窑中收取蓋小房或編荆囤兩頭泥封開一二小竅使通出入另開一小門泥封時時開郤掃除常淨不令他物所侵秋花雕盡留冬月蜂所食蜜餘蜜脾割取作蜜蠟至春三月掃除如前常於蜂窩前置水一器不致渴損春月蜂成有數箇蜂王當審多少壯與不壯若可分為兩窩止留蜂王兩箇其餘摘去如不分除舊蜂王外其餘蜂王盡行摘去窩烏禾反穴居也嵗用雜事四時類要正月豎籬落糞田開荒修蠶屋織蠶箔造桑機造麻鞋舂米此月人間築牆二月栽栁舒蒲桃上架解栗裹縳去石榴裹縳造醬是月合為中時寒食前後收柴炭造布浣冬衣採桑螵蛸三月利溝瀆葺垣牆治屋室以待霖雨脫墼移茄子造酪是月牛羊飽草好造也四月收蔓菁芥蘿蔔等子收乾椹子鋤蔥收乾笋藏笋此月伐木不蛀修隄防開水竇整屋漏以備暴雨五月灰藏毛羽物氈須人卧不卧則曬帚掃收蠶種豌豆蜀芥胡荽子六月命女工織紬絹收芥子中秋後種收花藥子便種之收李核便種收苜蓿收槐花曝乾斫竹此月及八月不蛀漚麻曬氈褥書裘種小蒜同七月蘿蔔七月收楮子浣故衣制新衣作夾衣以備始涼刈蒿草種蜀芥分薤漚晚麻耕菜地收荷葉隂乾拭漆器五月至此月晝經雨後漆器圖畫箱篋須曬乾則不損收瓜蒂收蒺䔧子同八月八月收薏苡收角蒿收韭花收胡桃收棗開蜜下旬造油衣收油麻秫江豆備冬衣刈莞葦九月收豕同十月收皂角貯麻子油採菊花收木瓜備冬藏凡蔓菁荏蓼韭輩脆美而不耐停若旱園菜稍硬停得至二月十月築垣牆墐北戶縳薦遮掩牛馬屋收槐實梓實收牛膝地黃造牛衣盤瘞蒲桃包裹栗樹石榴樹不爾即凍死收諸般穀種大小豆種十一月貨薪柴綿絮伐木取竹箭造什物農具折麻放麻刈蒿棘貯年支草於隙地至六月及秋霖時俱利倍十二月造車貯雪水收臘糟糞地刈棘屯牆造農器收羔種收牛糞農桑輯要卷七
