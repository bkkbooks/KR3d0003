body:
  text: 農桑輯要卷三元司農司撰栽桑柘附論桑種齊民要術桑椹熟時收黑魯椹黃魯桑不耐久諺曰魯桑百豐錦帛言其桑好功省用多博聞録白桑少子壓枝種之若有子可便種須用地隂處其葉厚大得繭重實絲倍每常士農必用桑之種性惟在辨其剛柔得樹藝之宜使之各適其用桑種甚多不可遍舉世所名者荆與魯也荆桑多椹魯桑少椹葉薄而尖其邊有瓣者荆桑也凡枝幹條葉堅徑者皆荆之類也葉圓厚而多津者魯桑也凡枝幹條葉豐腴者皆魯之類也荆之類根固而心實能久遠宜為樹魯之類根不固而心不實不能久遠宜為地桑然荆桑之條葉不如魯桑之盛茂當以魯條接之則能久遠而又盛茂也魯為地桑而有壓條換根之法𫝊轉無窮亦是可以長久也荆桑之類宜飼大蠶其絲堅紉中紗羅書禹貢厥篚檿絲注曰檿山桑此荆之類而尤佳者也魯桑之類宜飼小蠶種椹齊民要術收黑魯椹即日以水淘取曬燥仍畦種治畦下種一如葵法常薅令淨泛勝之書曰種桑法五月取椹著水中即以手漬之以水洗取子隂乾治肥田十畝荒田久不耕者尤善好耕治之每畝以黍椹子各三升合種之黍桑當俱生鋤之桑令稀疏調適黍熟穫之桑生正與黍高平因以利鎌摩地刈之曝令燥後有風放火燒之桑至春生一畝食三箔蠶四時類要種桑如種葵法土不得厚厚即不生待高一尺又上糞土一遍務本新書四月種椹二月種舊椹亦同東西掘畦熟糞和土耬平下水水宜濕透然後布子或和黍子同種椹藉黍力易為生發又遮日色或預於畦南畦西種檾後藉檾隂遮映夏至長至三二寸旱則澆之若不雜黍種須旋搭矮棚於上以箔覆蓋晝舒夜捲處暑之後不須遮蔽至十月之後桑與黍秸同時刈倒順風燒之仍糝糞土蔽灰春暖榮茂次年移栽一法熟地先耩黍一壠另搓草索截約一托以水浸軟麵飯湯更妙索兩頭各歇三四寸中間勻抹濕椹子十餘粒將索臥於黍壠內索兩頭以土厚壓中間摻土薄覆隔一步或兩步依上臥一索四面取齊成行久旱宜澆十月刈燒加糞如前冬春擁雪蓋糞清明前後掃去霖雨時覷稀稠移補比之畦種旋移省力決活早二年得力如舊有椹春種更妙後宜築圍牆固護或慮索繁碎以黍椹相和於葫蘆內㸃種過處用帚掃勻或慮天旱宜就黍壠內撥土平勻順壠作區下水種之又法春月先於熟地內東西成行勻稀種檾次將桑椹與蠶沙相和或炒黍榖亦可趂逐雨後於檾北單耩或㸃種比之搭矮棚與黍同種緣檾隂高密又透風露雖種數十畝亦不甚委曲費力士農必用畦種與前法同種子宜新不宜陳新椹種之為上隔年春種多不生䕃畦搭棚為上檾麻次之黍苗又次之桑芽出間令相去五七寸營造尺寸也他倣此頻澆過伏可長至三尺割去檾麻至十月內附地割了撒亂草走火燒過火不可大恐損根糞草蓋至來春杷耬去糞草澆每一科自出芽三數箇留旺者一條已成根則不須䕃可頻澆至秋魯桑可長五七尺荆桑可長三四尺魯桑可移為地桑荆桑可移入園養之地桑務本新書夫地桑本出魯桑若以魯桑萌條如法栽培揀肥旺者約留四五條鋤治添糞條有定數葉不繁多衆葉脂膏聚於一葉其葉自大即是地桑栽地桑法秋後於熟白地內深耕一犂就壠加糞撥土為區如無牛掘區亦可春分前後取臘月所埋桑條埋條法如後㨂有萌芽處各盤七八寸或一尺鏉區下水臥條栽之覆土約厚三四指深厚則難生以手按勻區東南西種檾五七粒五月之後芽葉微高旋添糞土已後條高便作地桑或㨂魯桑萆兒秋間埋頭深栽更疾得力士農必用地桑之功惟在治之如法不致荒燥無樹桑之家純用地桑則人力倍省有樹桑兼地桑之家樹葉既成地桑可止而勿用加澆鋤之功使之滋長至其蠶大眠之後或樹桑不能時至則可就取地桑補之蠶至終老不致闕食布地桑法牆圍成園將園內地或牛犂或钁斸熟方五尺內掘一坑內地一畝合栽一百四十科方深各二尺坑內下熟糞三升生糞不中壯地不用和土勻下水一桶調成稀泥將畦內種成魯桑連根掘出一科自根上留身六七寸其餘截去截斷處火𨫼上烙過每一坑栽一根將根坐於泥中欲疾見功者栽二根按至坑底提三五次欲令根須舒順按桑身頂與地平擁周圍熟土令坑滿次日築實匝坑四邊築下土至半坑根下土自實不實則根土不相著多懸死上半坑擁熟土輕築令平滿附身土不可築實實則芽難生用虛土封堆如大𨫼子樣可厚五七寸周圍自成環池水澆於內芽出虛土四五指每一根止留一二條澆鋤如法當年可長五尺餘次年附根割條葉飼蠶須用厚背剛鎌一割要斷鈍鎌一割不能斷則條楂不齊雨浸傷根地桑不宜放出身只要條從土中長出身出土名為腳高身上所長條不旺又多被風雨擺折割過處每一根盤周圍數芽出每一科可計留四五條餘者間去年年附地割之根漸旺留條漸多野魯桑根科栽之亦可全如前法地桑三年後正長旺五年後根相交根交則不旺春時將相交根斫斷掘去添上糞土或澆過或得雨即復長旺次後斟酌其根欲大將壓成栽子圍别園如前法栽之三年後新桑茂盛養蠶所桑時將舊桑根上只留一條隔年自成一樹分出栽為行桑如此傳轉無有盡期然魯桑所飼蠶其絲少堅韌可斟酌栽荆桑樹於大眠後取葉間飼之韓氏直說地桑須於近井園內栽之有草則鋤無雨則澆比及蠶生可澆三次其葉自然早生桑種自有早生者遲生者須擇其早生者為地桑則可移栽齊民要術桑椹畦種明年正月移而栽之仲春季春亦得率五尺一根大都種椹長遲不如壓枝之速無栽者乃種椹也其下常斸掘種菉豆小豆二豆良美潤澤益桑栽後二年慎勿採沐小採者長倍遲務本新書桑生一二年脂脈根株亦必微嫩春分之後掘區移栽區北直上下栽成土壁壁底旁鏉其土下水三四升將桑草兒靠壁栽立根科須得勻舒以土堅覆土壁比區地約高三二寸大扺一切草木根科新栽之後皆惡搖擺故用土壁遮禦北風迎合日色今時移栽小桑微帶根鬚上無寸土但經路遠風日耗竭脂脈栽後難活縱活亦不榮旺卻稱地法不宜此係拙謬今後應栽小樹若路遠移多約十餘樹通為一束於根鬚上蘸沃稀泥泥上糝土上以草包或席蒲包包內另用淳泥固塞仍劈夾車箱兩頭不透風日中間順臥樹身上以席草覆蓋預於栽所掘區下糞樹到之時便下水依法栽培秋栽法平昔栽桑多於春月全樹移栽春多大風吹擺加之春雨艱得又天氣漸熱芽葉難禁故多不活活亦遲得力若是斫去元幹再長樹身桑間鐵腥愈旺地桑是其驗也迤南地分十月埋栽河朔地氣頗寒故宜秋栽霖雨內為上時區深一尺之上平地約留樹身一二指餘者斫去栽罷地須堅築以土封瘢比及地凍於上約量添糞春暖之後就糞撥為土盆雨則可聚旱則可澆樹南春先種檾比及霖雨以來芽條藂茂就作地桑或削去細條存留旺者一二枝次年便可成樹或是就壓傍條一樹又生十餘比之全樹栽者樹樹必活桑亦榮茂十月木迷宜栽埋頭桑截去桑身栽如秋栽法冬月根脈下行乘春併發一年之間長過元樹栽二年之上其間但有芽葉不旺者於榖雨時以硬木貼樹身去地半指一斧截斷快錛更妙糝土封其樹瘢樹南種黍五七粒十餘日妒出芽條旱則頻澆立夏之後不宜此法一嵗之中除大寒時分不能移栽其餘月分皆可農桑要旨云平原淤壤土地肥虛荆桑魯桑種之俱可若地連山陂土脈堅硬止宜荆桑又初栽後成科時中心長條上葉勿採其餘在旁腳科止捋其葉且勿剸斫蓋令枝葉繁密就為藩蔽以防牛畜咬損犁擺拖挽之患後中心枝既粗即可剸所在旁科條本根既盛脂脈盡歸中心枝便可長成大樹堅久茂盛不生糠心士農必用種藝之宜惟在審其時月又合地方之宜使之不失其中栽培所宜春分前後十日十月內並為上時春分前後以及發生也十月號陽月又曰小春木氣長生之月故宜栽培以養元氣此洛陽方左千里之所宜其他地方隨時取中可也桑者易生之物嘗於長安試地桑除十一月不生活餘月皆可然春時及寒月必於天氣晴明巳午間藉其陽和如其栽子已出元土忽變天寒風雨以熱土調泥栽培之熱月則必待晚凉仍預於園內稀種檾或麻黍為䕃養樹桑法牆圍成園大小隨人所欲將園內地耕斸熟方三尺許掘一坑坑之方深下糞水與栽地桑法同將畦內種出荆桑全條連根掘出栽培亦如前法但所築實土與地平上復用土封身一二尺周圍自成環池無雨則澆待桑身長至一大人高割去梢子則橫條自長任令滋長休科去新條當春不宜科科了數年不旺十二月內或次年正月科則不妨如澆治有功至秋可長大如壯椽十月內或次年春可移為行桑若不如此於園內養成從小便栽為行桑者多被風雨孳畜損壞野荆桑不成身者移根於園內養之亦同栽培如地桑法芽出留旺者一條長至如大人高其科養如前壓桑齊民要術須取栽者正月二月中以鉤杙壓下枝令著地條葉生高數寸仍以燥土壅之土濕則爛明年正月中截取而種之住宅上及園畔者固宜即定其田中種者亦如種椹法先穊種二三年然後更移務本新書寒食之後將二年之上桑全樹以兜撅祛定掘地成渠條上已成小枝者出露土上其餘條樹以土全覆樹根周圍撥作土盆旱宜頻澆如無元樹止就桑下腳窠依上掘渠埋壓六月不宜全壓士農必用春氣初透時將地桑邊傍一條梢頭截了三五寸屈倒於地空處多用栽子多屈幾條隨人所欲地上先兜一渠可深五指餘臥條於內用鉤撅子攀釘住條短則二箇長則三箇懸空不令著土其後芽條向上生如細杷齒狀橫條上約五寸留一芽其餘剝去可飼小蠶至四五月內晴天巳午時間橫條兩邊取熱溏土擁橫條上成壠橫條即為臥根至晚澆其根科當夜臥根生須至秋其芽條皆為條身至十月或次年春分前後際臥根根頭截斷取出隨間空處斫斷一如拐子樣每一根為一栽此法萌芽栽子無窮栽條務本新書秋暮農隙時分預掘下區藉地氣經冬藏濕又分減栽時併忙區方深各二尺之上熟糞一二升與土相和納於區內土宜北高南下以留冬春雨雪餘區準此臘月內㨂肥長魯桑條三二根通連為一窠快斧斫下即將楂頭於火內微微燒過每四十五條與稈草相間作一束臥於向陽坑內坑深長三四尺當預掘下防冬深地凍難掘以土厚覆春分已後取出卻將元區跑開下水三四升布粟三二十粒將條盤曲以草索繫定臥栽區內覆土約厚三四指如或出露條尖三二寸覆土宜厚尺餘俱當堅築仍以虛土另封條尖已後芽生虛土自充先於區南種檾地宜隂濕時時澆之若全臥栽者已後逐旋添土芽條長高斫去傍枝三年可以成樹或就作地桑栽桑梢據埋頭栽桑斫下桑梢相連三二枝為一窠栽如前法或於蘿蔔內穿過一枝假借氣力更妙掘區堅埋依前法壠種桑條秋耕熟地二月再擺勻東西起場約量遠近墢土為區將臘月元埋桑條栽依前法或是單根長桑條依上栽之亦可栽種桑條者若舊桑多處可以多斫萌條若是少處又慮斫伐太過次年誤蠶故具種椹壓條栽條之法三者擇而行之士農必用插條法牆圍成園掘坑如地桑法大葉魯桑條上青眼動時斜條長一尺之上截斷兩頭烙過每一坑內微斜插三二條栽培如地桑法待芽出封堆虛土三五寸每一根斜止留一條至秋可長數尺次年割條葉飼蠶止怕當年三伏日澆䕃不闕無不活者畦內插亦可如當處無可採之條預於他處擇下大葉魯桑臘月割條藏於土穴如藏花果接頭透風則乾了候至桑樹條上青眼微動時開穴所藏條上眼亦動但黃色截烙栽培用度如前布行桑齊民要術士農必用種椹而後移栽移栽而後布行務本新書畦種之後即移為行桑無轉盤之法齊民要術桑栽大如臂許正月中移之亦不須髠率十步一樹隂相接則妨禾豆行欲小掎角不用正相當相當則妨犂士農必用園內養成荆魯桑小樹如轉盤時於臘月內可去不便枝梢小樹近上留三五條碗口以上樹留十餘條長一尺以上餘者皆斜去至來春桑眼動時連根掘來於漫地內濶八步一行行內相去四步一樹相對栽之栽培澆灌如前法桑行內種田濶八步牛耕一繳地也行內相去四步一樹破地四步已久可成大樹相對則可以橫耕故田不廢墾桑不致荒荆棘圍護當年橫枝上所長條至臘月科令稀勻得所至來春便可養蠶野桑成身者即可移栽留橫枝如前法一名一生桑其根平淺故不久自死轉盤換根則長旺又久遠也農家移栽為轉盤桑同果樹一移一旺舊根斫斷新根即生新根不平生向下生也以此故長旺久遠修蒔治蟲蠧等法附齊民要術凡耕桑田不用近樹傷桑破犂所謂兩失其犂不著處斸地令起斫去浮根以蠶矢糞之去浮根不妨耬犂令樹肥茂也又法嵗常繞樹一步散蕪菁子收穫之後放豬啖之其地柔軟有勝耕者種禾豆欲得逼樹不失地利田又調熟繞樹散蕪菁者不勞逼也務本新書桑隔內修蒔宜淨使透風日則桑決榮茂萬一有步屈等蟲又易捕打冬春之際免野火延燒備春旱者秋深預於桑下約量擁糞經冬地氣藏濕桑亦榮旺春月墢作土盆雨則可聚旱則可鋤鋤治桑隔自然耐旱又辟蟲傷瀕河近井若能一澆亦不失節備霜災者三月間儻值天氣陡寒北風大作先於園北覷當日風勢多積糞草待夜深發火燠煴假借烟氣順風以解霜凍花果倣此士農必用樹桑之病自變革之後桑田不治積有嵗年茍就其久荒之業為一時之用荒桑晚生其蠶則稚稚蠶老遲則科葉亦遲故明年之葉其生也又差晚矣積年愈多則與蠶生之日愈不能相及為蠶事者必當開墾其田科斫其桑使之滋長成條其次年所生之葉與蠶生之時自不相遠也韓氏直說桑樹腳科並浮根依時皆可斸去可做栽子者依法栽之不妨耕種其桑自然根深耐旱葉早生榮茂農桑要㫖云害桑蠶蠧不一蠦蛛步屈麻蟲桑狗為害者當生發時必須於桑根周圍封土作堆或用蘇子油於桑根周圍塗掃振打既下令不得復上即蹉撲之或張布幅下承以篩之野蠶為害者其蟲與家蠶同眠起小時不為害欲大眠時將應有五六日內飼蠶桑葉併力收斫連枝積貯不令日氣曬炙其野蠶當斫時自然振落縱有留者亦因積貯蒸死一二日桑葉萎軟當旋旋剸下切細以溫鹽水拌飼之不惟其葉生新抑鹽性涼於蠶有益不然遲於收斫三日內野蠶大眠起桑葉必盡為所食家蠶又何望乎又有蜣蜋蟲性如蠦蛛晝潛於上夜出食葉必須上用大棒振落下用布幅承聚於上風燒之桑間蟲聞其氣即自去以上蟲蓋食葉者也又有蠧根食皮而飛者名曰天水牛於盛夏時生皆沿樹身匝地生子其子形類蛆吮樹膏脂到秋冬漸大蠧食樹心大如蠐螬至三四月間化成樹􅀈郤變天水牛故其樹方秋先發黃葉經冬及春必漸枯死除之之法當盛夏食樹皮時沿樹身必有流出脂液濕處離地都無三五寸即以斧削去打死其子其害自絶若已在樹心者宜以鑿剔除之凡諸害桑蟲蠧皆因桑隔荒蕪而生以致纍及熟桑使盡修築下為熟地必無此害桑蟲蠧也又桑間可種田禾與桑有宜與不宜如種榖必揭得地脈亢乾至秋桑葉先黃到明年桑葉澀薄十減二三又致天水牛生蠧根吮皮等蟲若種薥黍其梢葉與桑等如此叢雜桑亦不茂如種菉豆黑豆芝麻瓜芋其桑鬱茂明年葉增二三分種黍亦可農家有云桑發黍黍發桑此大槩也科斫採葉附齊民要術劙桑十二月為上時正月次之二月為下白汁出則損葉大率桑多者宜苦斫桑少者宜省劙秋斫欲苦而避日中觸熱樹焦枯苦所春條茂冬春省劙竟日得作春採者必須長梯高杌數人一樹還條復枝務令淨盡要欲旦暮而避熱時梯不長高枝折人不多上下勞條不還枝仍曲採不淨鳩腳多且暮採令潤澤不避熱條葉乾秋採欲省裁去妨者秋多採則損條士農必用樹桑惟在稀科時斫依時斫也使其條葉豐腴而早發不致蠶之稚也稀則條自豐葉自腴今年科不過時則長條豐美明年之葉自然早發而又腴潤也又科斫之利惟在不留中心之枝容立一人於其內轉身運斧條葉偃落於外比之擔負高杌繞樹上下科有心之樹者一人可敵數人之功條不可冗冗則費芟科之功葉薄而無味是故科斫為蠶事之先務時人不知預治於農隙之時而徒費功力於蠶忙之日人則倍勞蠶亦失所如得其法使樹頭易得其條條上易得其葉蠶不待食葉以時生又其葉潤厚農語云鋤頭自有三寸澤斧頭自有一倍桑秦中一法名曰剝桑臘月中悉去其冗所存之條甚疏又於所存條根之上僅留四眼餘皆去之其所留者明年則為柯其眼中所發青條可長三數尺其葉倍長光澤如沃蠶逼老而手採之獨留一向外之條滋長及秋其長已至尋丈臘月復科之如前嵗久則所留之柯繁重復從下斫去既周而復始洛陽河東亦同山東河朔則異於是必留萌條疑風土所宜然欲一試此剝桑之法而未果也斫樹法自移栽時長五七尺高便割去梢既不留中心其條自向外長樹長大中心可容立一人如長成樹者當中有身及枝者亦可斫去科條法凡可科去者有四等一瀝水條向下垂者一刺身條向裏生者一駢指條相併生者選去其一一冗脞條雖順生郤稠冗臘月為上正月次之臘月津液未上又農隙人家春科只圖容易剝皮郤損了津液也欲用桑皮將臘月正月科下條向陽土內培了至二月中取之自可剝惟在時之和融手之審密封繫之固擁包之厚使不致疏淺而寒凝也春分前十日為上時前後五日為中時然取其條眼襯青為時尤好此不以地方遠近皆可準也然必待晴暖之日以藉其陽和也接不密則氣液難通擁包不固厚則風寒入而害生也果之一生者質小而味惡既一接之則質碩大而味美桑亦如是故接換之功不容不知也且木之生氣冬則藏於骨肉之際春則行於肌肉之間生氣既行津液隨之亦如人之生脈夜沈晝浮而氣血從之皮膚之內堅骨之外青而潤者木之肌肉也今乘發生之時即其氣液之動移精美之條笋以合其鄙惡之幹質使之功相附麗二氣交通通則變變則化向之所謂鄙惡者而潛消於冥冥之中蓋精美之至其用乃神山谷道人接花之什有云雍也本犂子仲由元鄙人升堂與入室都在一揮斤可謂善形容造化之妙者也接廢樹廢樹老樹也謂枝幹豐大條短葉薄不能復滋長者接法可傳者有四一插接二劈接三靨接又名貼接又名神仙接四批接又名搭接其法度各具本條廢樹可插接又可劈接插接法附地鋸斷於砧盤上肌肉內附骨用竹箆子插下可深一寸半或插或釘竹箆子大小比接頭劈半樣一面蒲背一面平也削成馬耳狀用時噙養溫和插時平面附骨鋸過處為砧盤堅木為骨皮內骨外青軟者為肌肉鋸用細齒者齒粗傷肌肉接頭可長五寸之上其眼襯青者根頭一寸半用薄刃刀子刻下中半刻成判官頭樣餘半削其骨成馬耳狀又與刻下處相照蒲背上用刀子遏斷浮皮剝去顯露肌肉輕遏不可傷肌肉又將馬耳尖頭薄骨割去半分青肌肉自長於骨尖半分也將接頭噙養溫暖假借人之生氣易活人於其時不可喫酒及濃厚滋味物取出箆子就用青肌肉半分裹接頭馬耳尖插下極要嵌密每一砧盤上插二條或三條令接頭之骨與樹之骨相著肌肉與樹之肌肉相著木之津液行於肌肉之間如不相對著又不緊密多不活如不用半分肌肉裹馬耳尖則擦了肌肉故亦多有不活者用新牛糞和土為泥封泥了濕土封堆大小斟酌其樹盤接頭頂上可留一二眼土厚三四寸周圍棘刺遮護接頭生芽條出土長高一二尺約量留三二條其餘割去傍埋椽子一條為依柱芽條漸長用繩子或葛條總繫在柱上不如此被風雨擺折芽條漸長壯止可留二條後為雙身樹也當年可長八九尺一丈至大人高時截去梢其橫枝自長勿採剝至臘月內科截橫條每一身可留三四枝各長一尺然不可拘定或可長可短取其樹勢圓也明年為柯柯上起條採令稀勻至秋成樹劈接亦可其法如後又法掘土見根將橫根周圍一遭斧斫斷掘去中間正根將周圍根楂細鋸子截成砧盤每一砧盤或劈接或插接二三接頭斟酌砧盤大小細根不堪接者勿用封堆等如前法芽條出土若太稠密則間令得所至來年止留一條大者於本地其餘分出為栽子於别地栽之用依柱如前劈接法先附地平鋸去身幹於砧盤傍向下一寸半皮肉上用快刀子尖向上左右斜批豁兩道至平面其下尖其上濶一指中間批豁斷者剔去其批豁了處如一鴉子樣渠子也兩壁有斜面無平底其尖淺向上漸深至平面可深至半指許接頭可長五寸其粗細如一指許者於根頭一寸半內量留一半將其外一半左右削兩刀子成蕎麥楞樣令頭尖口內噙養溫暖嵌於砧盤傍所批渠子內極要緊密須使老樹肌肉與接頭肌肉相對著於一砧盤上如此接至數箇斟酌砧盤大小用新牛糞土泥封泥了所繫桑皮然後用濕土封堆接頭上可厚五寸大小酙酌其樹盤周圍棘刺遮護接頭上條芽出土長高一二尺約量留三二條用依柱如前靨接法可就於橫枝上截了留一尺許然尺寸不可拘定惟取樹勢圓也於接頭上眼外方半寸刀尖刻斷皮肉至骨款揭下帶眼皮肉一方片其眼底骨上一小心子如米粒此是一芽生氣之根揭時用指甲尖剗起令其小心子帶於皮肉之上口噙少時取出印濕痕於橫枝上復噙養之用刀尖依濕痕四圍刻斷皮肉揭去露骨將接頭上靨皮嵌貼上其眼向上勿令顛倒上下兩頭用新細薄桑皮繫了斟酌其緊慢太緊則生氣不通太慢則不相附著俱難活也用牛糞和泥眼四邊泥了其所貼之靨多少可量其樹之大小搭接法就畦內將已種出荆桑隔年芽條去地三寸許向上削成馬耳狀將一般粗細魯桑接頭亦削成馬耳狀兩馬耳相搭細桑皮繫了牛糞泥封濕土擁培其芽條出土可留一二芽至秋長如一大人高明年可移入園中養之其法如前接諸果木亦同取藏接頭側近有接頭者臨接時取遠處有者預先於臘月節氣內割取其條其採取培養之法全如插條法內所說如取接頭處過遠者可於未曽盛油新柿簍中與蒲穰一處藏了外密封不透雖行千里不致凍傷果木宜二年條其藏及接法亦同接大小樹大樹宜劈接插接小樹宜搭接靨接附地接者封泥擁培如前半身截成砧盤接者但其縫罅上用紙封又用破席片包裹如仰盆子樣內盛潤土培養其接頭勿令透風用無底瓦罐盆子代席片亦可土乾則灑水所包土上條芽長出其所包土亦休取去至秋條長成接處長定所包土不用也如接頭都活則斟量橫枝多少樹之氣力留之義桑務本新書假有一村兩家相合低築圍牆四面各一百步若戶多地寬更甚省力一家該築二百步牆內空地計一萬步每一步一桑計一萬株一家計分五千株若一家孤另一轉築牆二百步牆內空地止二千五百步依上一步一桑止得二千五百株其功利不侔如此恐起爭端當於園心以籬界斷比之獨力築牆不止桑多一倍亦遞相藉力容易句當桑雜類齊民要術椹熟時多收曝乾之凶年粟少可以當食魏略曰楊沛為新鄭長興平末人多飢窮沛課民益畜乾椹收䝁豆閲其有餘以補不足積聚千餘斛㑹太祖西迎天子所將千人皆無糧沛謁見乃進乾椹太祖甚善及太祖輔政超為鄴令賜生口十人絹百匹既欲勵之且以報乾椹也令自河以北大家收百石少者尚數十斛故杜葛亂後饑饉薦臻惟仰以全軀命數州之內民死而生者乾椹之力也務本新書桑椹平時以棗椹拌饀煿餅食之甜而有益椹子煎採熟椹盆內微研以布紐汁磁器盛頓晝夜露地放之四十九日以湯㸃服明耳目益水藏和血氣或加蜜少許石器同煎亦可病諸瘡疾作膏藥貼神效桑螵蛸桑根白皮皆入藥用桑皮抄紙春初剸斫繁枝剝芽皮為上餘月次之桑木為弓弩胎則耐挽拽桑莪素食中妙物又五木耳桑槐榆栁楮是也桑槐者為良野田中者恐有毒不可食柘齊民要術種柘法耕地令熟耬耩作壟柘子熟時多收以水淘汰令淨曝乾散訖勞之草生拔卻勿令荒沒三年間斸去堪為渾心扶老杖十年中四破為杖任為馬鞭胡牀十五年任為弓材亦堪作履裁截碎木中作錐刀靶二十年好作犢車材欲作鞍橋者生枝長三尺許以繩繫旁枝木橛釘著地中令曲如橋十年之後便是渾成柘橋欲作快弓材者宜於山石之間北隂中種之其高原山田土厚水深之處多掘深坑中種桑柘者隨坑深淺或一丈丈五直上出坑乃扶疏四散此樹條直異於常材十年之後無所不任柘葉飼蠶絲好作琴瑟等絃清鳴響徹勝於凡絲遠矣博聞録柘葉多藂生幹疏而直葉豐而厚春蠶食之其絲以冷水繅之謂之冷水絲柘蠶先出先起而先繭柘葉隔年不採者春再生必毒蠶如不採夏月皆要打落方無毒農桑輯要卷三
